<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
    <title>XrayPapa·节奏边缘</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --space-2: 2px;
            --space-4: 4px;
            --space-6: 6px;
            --space-8: 8px;
            --space-10: 10px;
            --space-12: 12px;
            --space-14: 14px;
            --space-16: 16px;
            --space-18: 18px;
            --space-20: 20px;
            --space-24: 24px;
            --space-28: 28px;

            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.08);
            --shadow-xl: 0 20px 60px rgba(0, 0, 0, 0.15);

            --text-xs: 0.6rem;
            --text-sm: 0.7rem;
            --text-base: 0.85rem;
            --text-md: 0.95rem;
            --text-lg: 1.2rem;
            --text-xl: 1.6rem;
            --text-2xl: 2.4rem;
            --text-3xl: 4.2rem;
            --text-4xl: 5.6rem;

            --bg: #F5F2ED;
            --surface: #FFFFFF;
            --surface-border: #E0DBD0;
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-muted: #8A8A9E;
            --primary: #7C3AED;
            --primary-light: #A78BFA;
            --primary-bg: rgba(124, 58, 237, 0.12);
            --edge: #EF4444;
            --edge-bg: rgba(239, 68, 68, 0.10);
            --rest: #0EA5E9;
            --rest-bg: rgba(14, 165, 233, 0.12);
            --success: #22C55E;
            --beat-color: rgba(124, 58, 237, 0.12);
            --modal-overlay: rgba(0, 0, 0, 0.40);
            --btn-radius: 6px;
            --radius: 20px;
            --radius-sm: 12px;
            --radius-full: 9999px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        [data-theme="dark"] {
            --bg: #0A0A0F;
            --surface: #14141C;
            --surface-border: #3A3A4A;
            --text-primary: #F0F0F5;
            --text-secondary: #C0C0D0;
            --text-muted: #9A9AAE;
            --primary: #0088FF;
            --primary-light: #4DB8FF;
            --primary-bg: rgba(0, 136, 255, 0.20);
            --edge: #FF6B6B;
            --edge-bg: rgba(255, 107, 107, 0.14);
            --rest: #22D3EE;
            --rest-bg: rgba(34, 211, 238, 0.15);
            --success: #4ADE80;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.45);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.65);
            --shadow-xl: 0 20px 60px rgba(0, 0, 0, 0.80);
            --beat-color: rgba(0, 136, 255, 0.20);
            --modal-overlay: rgba(0, 0, 0, 0.70);
        }
        html,
        body {
            height: 100%;
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.4;
            touch-action: manipulation;
            transition: background var(--transition), color var(--transition);
            overflow: hidden;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-8);
            min-height: 100vh;
            min-height: 100dvh;
        }
        .app {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 96vh;
            margin: 0 auto;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--surface-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            transition: border-color 0.4s ease, box-shadow 0.4s ease, background 0.3s ease;
            padding: var(--space-10) var(--space-12) var(--space-6) var(--space-12);
            will-change: transform, box-shadow, border-color, background;
        }
        .app.edge-flash {
            border-color: var(--edge) !important;
            box-shadow: 0 0 50px rgba(239, 68, 68, 0.14);
        }
        .app.resting-active {
            border-color: var(--rest) !important;
            box-shadow: 0 0 60px rgba(14, 165, 233, 0.18);
        }
        .app.immersive .app-header {
            opacity: 0;
            pointer-events: none;
            height: 0;
            overflow: hidden;
            padding: 0;
            margin: 0;
            border: none;
            transition: opacity 0.35s ease, height 0.35s ease;
        }
        .app.immersive .mode-selector-row {
            opacity: 0;
            pointer-events: none;
            height: 0;
            overflow: hidden;
            padding: 0;
            margin: 0;
            border: none;
            transition: opacity 0.35s ease, height 0.35s ease;
        }
        .app.immersive .footer-bar,
        .app.immersive .data-row {
            opacity: 0;
            pointer-events: none;
            height: 0;
            overflow: hidden;
            padding: 0;
            margin: 0;
            border: none;
            transition: opacity 0.35s ease, height 0.35s ease;
        }
        .app.immersive .visual-merged {
            padding: var(--space-10) var(--space-8);
            margin: 0 0 var(--space-6) 0;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(2px);
            box-shadow: var(--shadow-sm);
        }
        [data-theme="dark"] .app.immersive .visual-merged {
            background: rgba(0, 0, 0, 0.15);
            border-color: rgba(255, 255, 255, 0.04);
        }
        .app.immersive .bpm-big {
            font-size: var(--text-4xl);
        }
        .app.immersive .control-bar {
            padding: var(--space-4) 0 var(--space-6);
        }
        .app.immersive .progress-wrap {
            padding: var(--space-4) 0 var(--space-4);
        }
        .app.immersive .bpm-hero {
            padding: var(--space-8) 0 var(--space-6);
            min-height: 110px;
        }
        .app.immersive .vis-circle {
            max-width: 260px;
        }
        .app.immersive .status-badge {
            opacity: 1 !important;
            pointer-events: none !important;
        }
        .app.immersive .btn-grid {
            max-width: 280px;
        }

        /* ===== Header ===== */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-8) 0 var(--space-14) 0;
            flex-shrink: 0;
            background: transparent;
            position: sticky;
            top: 0;
            z-index: 2;
            min-height: 56px;
            border-bottom: 1px solid var(--surface-border);
            margin-bottom: var(--space-6);
            transition: border-color var(--transition);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: var(--space-10);
        }
        .logo-icon {
            font-size: 32px;
            line-height: 1;
            filter: grayscale(0.3);
        }
        .app-header .title {
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            transition: color var(--transition);
            line-height: 1.2;
        }
        .app-header .title small {
            font-weight: 500;
            font-size: var(--text-xs);
            color: var(--text-muted);
            background: var(--primary-bg);
            padding: var(--space-2) var(--space-12);
            border-radius: var(--radius-full);
            margin-left: var(--space-6);
            letter-spacing: 0.4px;
            transition: all var(--transition);
            display: inline-block;
            vertical-align: middle;
        }

        /* ===== 拉灯绳 ===== */
        .light-pull {
            position: relative;
            width: 36px;
            height: 54px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
            flex-shrink: 0;
            padding-top: var(--space-2);
        }
        .pull-rope {
            width: 2px;
            height: 26px;
            background: var(--text-muted);
            flex-shrink: 0;
            border-radius: 2px;
            transition: height 0.35s cubic-bezier(0.34, 1.2, 0.64, 1), background 0.3s ease;
            position: relative;
            transform-origin: top center;
        }
        .pull-rope::after {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--surface-border);
            border: 1px solid var(--text-muted);
            transition: background 0.3s ease;
        }
        .pull-ring {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2.5px solid var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1), border-color 0.3s ease, background 0.3s ease;
            background: var(--surface);
            margin-top: -1px;
            flex-shrink: 0;
            position: relative;
            box-shadow: var(--shadow-sm);
        }
        .pull-ring .ring-inner {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            transition: background 0.3s ease, transform 0.3s ease;
            box-shadow: 0 0 12px rgba(124, 58, 237, 0.15);
        }
        [data-theme="dark"] .pull-ring .ring-inner {
            background: var(--primary-light);
            box-shadow: 0 0 12px rgba(0, 136, 255, 0.25);
        }
        .light-pull.pulled .pull-rope {
            height: 44px;
        }
        .light-pull.pulled .pull-ring {
            transform: translateY(20px) scale(0.92);
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }
        .light-pull.pulled .pull-ring .ring-inner {
            transform: scale(1.2);
        }
        .light-pull:active .pull-ring:not(.pulled) {
            transform: translateY(6px) scale(0.96);
        }
        .light-pull .pull-tooltip {
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: var(--text-xs);
            color: var(--text-muted);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            letter-spacing: 0.3px;
        }
        .light-pull:hover .pull-tooltip {
            opacity: 0.6;
        }

        /* ===== 模式选择行 ===== */
        .mode-selector-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-10);
            padding: var(--space-6) 0 var(--space-10) 0;
            flex-shrink: 0;
            border-bottom: 1px solid var(--surface-border);
            margin-bottom: var(--space-6);
            transition: all var(--transition);
        }
        .mode-current-display {
            display: flex;
            align-items: center;
            gap: var(--space-8);
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--text-secondary);
        }
        .mode-current-display .mode-name {
            color: var(--primary);
            font-weight: 700;
            font-size: var(--text-base);
            background: var(--primary-bg);
            padding: var(--space-2) var(--space-16);
            border-radius: var(--radius-full);
            border: 1px solid var(--surface-border);
            transition: all var(--transition);
        }
        .mode-current-display .mode-name.resting {
            color: var(--rest);
            background: var(--rest-bg);
            border-color: var(--rest);
        }
        .btn-mode-switch {
            padding: var(--space-8) var(--space-20);
            border-radius: var(--btn-radius);
            border: 1px solid var(--surface-border);
            background: var(--bg);
            color: var(--text-primary);
            font-size: var(--text-sm);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: var(--space-6);
            touch-action: none;
            user-select: none;
            min-height: 36px;
            box-shadow: var(--shadow-sm);
        }
        .btn-mode-switch:active {
            transform: scale(0.94);
            transition-duration: 0.08s;
        }
        .btn-mode-switch:hover {
            background: var(--primary-bg);
            border-color: var(--primary);
        }
        .btn-mode-switch .icon {
            font-size: var(--text-base);
        }
        @media (max-width:420px) {
            .btn-mode-switch .label-text {
                display: none;
            }
            .btn-mode-switch {
                padding: var(--space-6) var(--space-12);
                min-width: 40px;
            }
        }

        /* ===== BPM Hero ===== */
        .bpm-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--space-10) 0 var(--space-6) 0;
            flex-shrink: 0;
            user-select: none;
            position: relative;
            background: var(--surface);
            border-radius: var(--radius-sm);
            border: 1px solid var(--surface-border);
            margin-bottom: var(--space-8);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            min-height: 100px;
            will-change: transform, box-shadow, border-color;
            flex: 0 0 auto;
            box-shadow: var(--shadow);
        }
        .bpm-hero .bpm-ring {
            position: absolute;
            width: 70%;
            height: 70%;
            top: 15%;
            left: 15%;
            border-radius: 50%;
            border: 2px solid transparent;
            pointer-events: none;
            transition: border-color 0.5s ease, box-shadow 0.5s ease;
        }
        .bpm-hero .bpm-ring.warn {
            border-color: var(--edge);
            box-shadow: 0 0 60px rgba(239, 68, 68, 0.10);
        }
        .bpm-hero .bpm-ring.resting-ring {
            border-color: var(--rest);
            box-shadow: 0 0 70px rgba(14, 165, 233, 0.15);
            animation: rest-glow 2s ease-in-out infinite;
        }
        @keyframes rest-glow {
            0%,
            100% {
                box-shadow: 0 0 40px rgba(14, 165, 233, 0.10);
            }
            50% {
                box-shadow: 0 0 80px rgba(14, 165, 233, 0.25);
            }
        }
        .bpm-big {
            font-size: var(--text-3xl);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
            color: var(--text-primary);
            line-height: 1.05;
            transition: color var(--transition);
            position: relative;
            z-index: 1;
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: var(--space-2);
            will-change: transform, text-shadow;
        }
        .bpm-big.warn {
            color: var(--edge);
        }
        .bpm-big.resting-color {
            color: var(--rest);
        }
        .bpm-big .unit {
            font-size: var(--text-lg);
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 2px;
            margin-left: var(--space-2);
            transition: color var(--transition);
        }
        .bpm-big .rest-icon {
            font-size: var(--text-xl);
            margin-left: var(--space-6);
            opacity: 0;
            transition: opacity 0.4s ease;
            line-height: 1;
        }
        .bpm-big .rest-icon.show {
            opacity: 1;
        }
        .bpm-big .pre-sign {
            position: absolute;
            top: -8px;
            right: -32px;
            font-size: var(--text-lg);
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.25s ease, transform 0.25s ease;
            transform: scale(0.6);
            line-height: 1;
        }
        .bpm-big .pre-sign.show {
            opacity: 1;
            transform: scale(1);
        }
        .bpm-big .pre-sign.up {
            color: var(--edge);
        }
        .bpm-big .pre-sign.down {
            color: #3B82F6;
        }
        .bpm-big .pre-sign.rest {
            color: var(--rest);
        }
        .bpm-mode-label {
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 1.2px;
            text-transform: uppercase;
            margin-top: var(--space-2);
            position: relative;
            z-index: 1;
            transition: color var(--transition);
        }
        .bpm-mode-label.resting-label {
            color: var(--rest);
            font-weight: 600;
        }
        .bpm-hero .countdown-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-2xl);
            font-weight: 700;
            color: var(--primary);
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            background: var(--surface);
            border-radius: var(--radius-sm);
        }
        .bpm-hero .countdown-overlay.show {
            opacity: 1;
        }

        /* 休息进度条 */
        .rest-progress-wrap {
            position: absolute;
            bottom: var(--space-6);
            left: 12%;
            right: 12%;
            height: 3px;
            background: var(--surface-border);
            border-radius: var(--space-4);
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 2;
        }
        .rest-progress-wrap.show {
            opacity: 1;
        }
        .rest-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--rest), var(--primary-light));
            border-radius: var(--space-4);
            transition: width 0.3s linear;
        }

        .status-badge {
            position: absolute;
            top: var(--space-8);
            left: var(--space-12);
            display: flex;
            align-items: center;
            gap: var(--space-6);
            z-index: 5;
            opacity: 0.7;
            transition: opacity var(--transition);
            pointer-events: none;
        }
        .status-badge .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background 0.3s ease, box-shadow 0.3s ease;
            flex-shrink: 0;
        }
        .status-badge .dot.running {
            background: var(--success);
            box-shadow: 0 0 18px rgba(34, 197, 94, 0.35);
            animation: pulse-dot 0.9s infinite;
        }
        .status-badge .dot.resting-dot {
            background: var(--rest);
            box-shadow: 0 0 24px rgba(14, 165, 233, 0.40);
            animation: pulse-dot 0.6s infinite;
        }
        .status-badge .label {
            font-size: var(--text-xs);
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            transition: color var(--transition);
        }
        .status-badge .label.resting-label {
            color: var(--rest);
        }
        @keyframes pulse-dot {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.6);
                opacity: 0.4;
            }
        }

        /* ===== Visual Merged ===== */
        .visual-merged {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-12);
            padding: var(--space-14) var(--space-12);
            background: var(--bg);
            border-radius: var(--radius-sm);
            border: 1px solid var(--surface-border);
            transition: all var(--transition);
            flex-shrink: 0;
            margin-bottom: var(--space-6);
            box-shadow: var(--shadow-sm);
        }
        .vis-circle {
            position: relative;
            border-radius: var(--radius-sm);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 200px;
            aspect-ratio: 1/1;
            background: transparent;
        }
        .vis-circle canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: var(--radius-sm);
        }

        /* ===== Beat Progress ===== */
        .beat-progress-track {
            width: 100%;
            height: 12px;
            background: var(--surface-border);
            border-radius: var(--space-8);
            overflow: hidden;
            flex-shrink: 0;
            transition: background var(--transition);
            position: relative;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.06);
        }
        .beat-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: var(--space-8);
            transition: width 0.1s ease-out;
            will-change: width;
            box-shadow: 0 0 22px rgba(124, 58, 237, 0.18);
            position: relative;
        }
        .beat-progress-fill.resting-fill {
            background: linear-gradient(90deg, var(--rest), var(--primary-light));
            box-shadow: 0 0 22px rgba(14, 165, 233, 0.20);
        }
        .beat-progress-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%) scale(0);
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.35);
            transition: transform 0.08s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.08s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform;
        }
        .beat-progress-fill.show-head::after {
            transform: translateY(-50%) scale(1.8);
            box-shadow: 0 0 45px var(--primary-light);
        }
        .beat-progress-fill.resting-fill::after {
            background: var(--rest);
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.35);
        }
        [data-theme="dark"] .beat-progress-fill {
            box-shadow: 0 0 22px rgba(0, 136, 255, 0.25);
        }
        [data-theme="dark"] .beat-progress-fill::after {
            box-shadow: 0 0 30px rgba(0, 136, 255, 0.40);
        }
        [data-theme="dark"] .beat-progress-fill.show-head::after {
            box-shadow: 0 0 45px rgba(77, 184, 255, 0.50);
        }
        [data-theme="dark"] .beat-progress-fill.resting-fill {
            box-shadow: 0 0 22px rgba(34, 211, 238, 0.25);
        }
        [data-theme="dark"] .beat-progress-fill.resting-fill::after {
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.35);
        }

        /* ===== Progress Wrap ===== */
        .progress-wrap {
            padding: var(--space-4) 0 var(--space-6) 0;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: var(--space-14);
            background: transparent;
            margin-bottom: var(--space-4);
        }
        .progress-track {
            flex: 1;
            height: 8px;
            background: var(--surface-border);
            border-radius: var(--space-8);
            overflow: hidden;
            position: relative;
            transition: background var(--transition);
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.04);
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: var(--space-8);
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            will-change: width;
        }
        .progress-fill.warning {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
        }
        .progress-fill.danger {
            background: linear-gradient(90deg, var(--edge), #f87171);
        }
        .progress-fill.resting-progress {
            background: linear-gradient(90deg, var(--rest), var(--primary-light));
        }
        .progress-label {
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
            min-width: 48px;
            text-align: right;
            transition: color var(--transition);
        }
        .progress-label.left {
            text-align: left;
            min-width: 44px;
        }

        /* ===== Control Bar - 2x2 Grid ===== */
        .control-bar {
            padding: var(--space-4) 0 var(--space-4) 0;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--space-8);
            transition: all var(--transition);
            background: transparent;
            margin-bottom: var(--space-2);
            flex: 1 1 auto;
            min-height: 110px;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-10);
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
        }
        .btn {
            padding: var(--space-12) var(--space-16);
            border-radius: var(--btn-radius);
            border: 1px solid var(--surface-border);
            font-weight: 600;
            font-size: var(--text-base);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-6);
            touch-action: none;
            user-select: none;
            min-height: 50px;
            background: var(--surface);
            color: var(--text-primary);
            box-shadow: var(--shadow-sm);
            will-change: transform, box-shadow;
            width: 100%;
            min-width: 0;
            flex: 1 1 auto;
            -webkit-touch-callout: none;
        }
        .btn:active {
            transform: scale(0.96);
            transition-duration: 0.08s;
        }
        .btn-start {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
            font-size: var(--text-md);
            box-shadow: 0 2px 24px rgba(124, 58, 237, 0.22);
        }
        [data-theme="dark"] .btn-start {
            box-shadow: 0 2px 24px rgba(0, 136, 255, 0.35);
        }
        .btn-start.running {
            background: var(--edge);
            border-color: var(--edge);
            box-shadow: 0 0 32px rgba(239, 68, 68, 0.30);
            font-weight: 700;
        }
        .btn-start:active {
            transform: scale(0.96);
            transition-duration: 0.08s;
        }
        .btn-edge {
            background: var(--edge-bg);
            border-color: var(--surface-border);
            color: var(--edge);
            font-size: var(--text-sm);
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-edge:active {
            transform: scale(0.96);
            transition-duration: 0.08s;
            background: var(--edge-bg);
        }
        .btn-edge .edge-count {
            font-weight: 700;
            margin-left: var(--space-4);
            font-size: var(--text-base);
        }
        .btn-edge.flash {
            border-color: var(--edge);
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.14);
            background: var(--edge-bg);
        }
        .btn-edge.resting-btn {
            background: var(--rest-bg);
            border-color: var(--rest);
            color: var(--rest);
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.12);
        }
        .btn-params {
            background: var(--primary-bg);
            color: var(--primary);
            border-color: var(--surface-border);
            font-size: var(--text-sm);
        }
        .btn-params:active {
            transform: scale(0.96);
            transition-duration: 0.08s;
        }
        .btn-params .icon {
            font-size: var(--text-base);
        }
        .btn-reset {
            background: var(--bg);
            color: var(--text-secondary);
            border-color: var(--surface-border);
            font-size: var(--text-sm);
        }
        .btn-reset:active {
            transform: scale(0.96);
            transition-duration: 0.08s;
        }
        .btn-reset .icon {
            font-size: var(--text-base);
        }

        /* ===== Data Row ===== */
        .data-row {
            display: flex;
            justify-content: center;
            gap: var(--space-20);
            padding: var(--space-6) 0 var(--space-4) 0;
            flex-shrink: 0;
            font-size: var(--text-sm);
            color: var(--text-muted);
            letter-spacing: 0.3px;
            border-top: none;
            transition: all var(--transition);
            flex-wrap: wrap;
            background: transparent;
            min-height: 30px;
        }
        .data-row .data-item {
            display: flex;
            align-items: center;
            gap: var(--space-4);
        }
        .data-row .data-item .data-val {
            color: var(--text-secondary);
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            transition: color var(--transition);
            font-size: var(--text-base);
        }
        .data-row .data-item .data-val.highlight {
            color: var(--primary);
        }

        /* ===== 模态窗口 ===== */
        .modal-overlay {
            position: absolute;
            inset: 0;
            background: var(--modal-overlay);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            border-radius: var(--radius);
            padding: var(--space-20);
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: var(--space-24) var(--space-20) var(--space-20);
            max-width: 360px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--surface-border);
            transform: scale(0.92) translateY(12px);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
            opacity: 0;
            scrollbar-width: thin;
            scrollbar-color: var(--surface-border) transparent;
        }
        .modal-card::-webkit-scrollbar {
            width: 4px;
        }
        .modal-card::-webkit-scrollbar-track {
            background: transparent;
        }
        .modal-card::-webkit-scrollbar-thumb {
            background: var(--surface-border);
            border-radius: var(--space-4);
        }
        .modal-card::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
        .modal-overlay.open .modal-card {
            transform: scale(1) translateY(0);
            opacity: 1;
        }
        .modal-card .modal-title {
            font-size: var(--text-lg);
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: var(--space-16);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: var(--space-10);
            border-bottom: 1px solid var(--surface-border);
        }
        .modal-card .modal-title .close-btn {
            background: var(--bg);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: var(--text-base);
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }
        .modal-card .modal-title .close-btn:hover {
            background: var(--surface-border);
            color: var(--text-primary);
        }
        .modal-card .modal-body {
            padding: var(--space-4) 0;
        }

        /* ===== 模式列表 ===== */
        .mode-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
        }
        .mode-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-12) var(--space-16);
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--bg);
            color: var(--text-secondary);
            font-weight: 500;
            font-size: var(--text-base);
            touch-action: none;
        }
        .mode-list-item:hover {
            background: var(--primary-bg);
            border-color: var(--primary);
            color: var(--text-primary);
        }
        .mode-list-item.active {
            background: var(--primary-bg);
            border-color: var(--primary);
            color: var(--primary);
            font-weight: 600;
        }
        .mode-list-item .mode-icon {
            font-size: var(--text-lg);
            margin-right: var(--space-10);
        }
        .mode-list-item .mode-label {
            flex: 1;
        }
        .mode-list-item .mode-check {
            color: var(--primary);
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .mode-list-item.active .mode-check {
            opacity: 1;
        }

        /* ===== 参数窗口 ===== */
        .params-grid-modal {
            display: flex;
            flex-direction: column;
            gap: var(--space-14);
            padding: var(--space-2) 0;
        }
        .params-grid-modal .param-group {
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
        }
        .params-grid-modal .param-group label {
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .params-grid-modal .param-group .param-value {
            color: var(--primary);
            font-weight: 600;
            font-size: var(--text-sm);
        }
        .params-grid-modal .param-group input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: var(--space-6);
            background: var(--surface-border);
            outline: none;
            padding: 0;
            border: none;
            transition: background var(--transition);
        }
        .params-grid-modal .param-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(124, 58, 237, 0.25);
            border: 2px solid var(--surface);
        }
        .params-grid-modal .param-group input[type="range"]::-moz-range-thumb {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            border: 2px solid var(--surface);
        }
        .params-grid-modal .param-group .range-labels {
            display: flex;
            justify-content: space-between;
            font-size: var(--text-xs);
            color: var(--text-muted);
        }
        .params-grid-modal .param-group input[type="number"],
        .params-grid-modal .param-group select {
            width: 100%;
            padding: var(--space-6) var(--space-10);
            border-radius: var(--btn-radius);
            border: 1px solid var(--surface-border);
            background: var(--surface);
            color: var(--text-primary);
            font-size: var(--text-sm);
            font-family: inherit;
            outline: none;
            transition: all var(--transition);
            min-height: 38px;
        }
        .params-grid-modal .param-group input:focus,
        .params-grid-modal .param-group select:focus {
            border-color: var(--primary);
        }
        .params-grid-modal .param-group .bpm-list {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-4);
            margin-top: var(--space-2);
        }
        .params-grid-modal .param-group .bpm-tag {
            display: inline-flex;
            align-items: center;
            gap: var(--space-4);
            background: var(--primary-bg);
            padding: var(--space-2) var(--space-10) var(--space-2) var(--space-12);
            border-radius: var(--radius-full);
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--primary);
            border: 1px solid rgba(124, 58, 237, 0.08);
            transition: all var(--transition);
            min-height: 30px;
        }
        .params-grid-modal .param-group .bpm-tag .del {
            cursor: pointer;
            font-size: var(--text-sm);
            color: var(--text-muted);
            line-height: 1;
            padding: 0 var(--space-2);
            touch-action: none;
        }
        .params-grid-modal .param-group .bpm-tag .del:hover {
            color: var(--edge);
        }
        .params-grid-modal .param-group .add-bpm-row {
            display: flex;
            gap: var(--space-4);
            margin-top: var(--space-2);
        }
        .params-grid-modal .param-group .add-bpm-row input {
            flex: 1;
            min-width: 20px;
            padding: var(--space-4) var(--space-8);
            font-size: var(--text-sm);
            border-radius: var(--btn-radius);
            border: 1px solid var(--surface-border);
            background: var(--surface);
            color: var(--text-primary);
            transition: all var(--transition);
            min-height: 34px;
        }
        .params-grid-modal .param-group .add-bpm-row .btn-sm {
            padding: var(--space-4) var(--space-16);
            border-radius: var(--btn-radius);
            border: none;
            background: var(--primary);
            color: #fff;
            font-size: var(--text-sm);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            min-height: 34px;
            touch-action: none;
        }
        .params-grid-modal .param-group .add-bpm-row .btn-sm:active {
            transform: scale(0.94);
            transition-duration: 0.08s;
        }
        .params-grid-modal .param-group .radio-group,
        .params-grid-modal .param-group .waveform-btns {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
        }
        .params-grid-modal .param-group .radio-opt,
        .params-grid-modal .param-group .wf-btn {
            padding: var(--space-4) var(--space-14);
            border-radius: var(--btn-radius);
            border: 1px solid var(--surface-border);
            background: var(--surface);
            color: var(--text-secondary);
            font-size: var(--text-sm);
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s ease;
            min-height: 32px;
            display: flex;
            align-items: center;
            touch-action: none;
        }
        .params-grid-modal .param-group .radio-opt:active,
        .params-grid-modal .param-group .wf-btn:active {
            transform: scale(0.94);
            transition-duration: 0.08s;
        }
        .params-grid-modal .param-group .radio-opt.active,
        .params-grid-modal .param-group .wf-btn.active {
            background: var(--primary-bg);
            border-color: var(--primary);
            color: var(--primary);
        }

        .modal-actions {
            display: flex;
            gap: var(--space-10);
            margin-top: var(--space-18);
            padding-top: var(--space-14);
            border-top: 1px solid var(--surface-border);
        }
        .modal-actions .btn-modal {
            flex: 1;
            padding: var(--space-12) var(--space-18);
            border-radius: var(--btn-radius);
            border: 1px solid var(--surface-border);
            font-weight: 600;
            font-size: var(--text-base);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            background: var(--surface);
            color: var(--text-secondary);
            touch-action: none;
        }
        .modal-actions .btn-modal:active {
            transform: scale(0.96);
            transition-duration: 0.08s;
        }
        .modal-actions .btn-modal.primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
            box-shadow: 0 2px 16px rgba(124, 58, 237, 0.20);
        }
        [data-theme="dark"] .modal-actions .btn-modal.primary {
            box-shadow: 0 2px 16px rgba(0, 136, 255, 0.30);
        }
        .modal-actions .btn-modal.primary:active {
            transform: scale(0.96);
            transition-duration: 0.08s;
        }

        /* ===== Toast ===== */
        .toast-float {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.85);
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: var(--radius-sm);
            padding: var(--space-14) var(--space-28);
            box-shadow: var(--shadow-xl);
            font-size: var(--text-base);
            font-weight: 600;
            color: var(--text-primary);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(var(--surface-rgb, 255, 255, 255), 0.92);
            text-align: center;
            min-width: 160px;
            white-space: nowrap;
        }
        [data-theme="dark"] .toast-float {
            background: rgba(20, 20, 28, 0.92);
        }
        .toast-float.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: none;
        }
        .toast-float .toast-icon {
            margin-right: var(--space-8);
        }
        .toast-float .toast-sub {
            font-size: var(--text-sm);
            font-weight: 400;
            color: var(--text-muted);
            display: block;
            margin-top: var(--space-2);
        }

        /* ===== Footer ===== */
        .footer-bar {
            text-align: center;
            font-size: var(--text-xs);
            color: var(--text-muted);
            padding: var(--space-6) 0 var(--space-2) 0;
            flex-shrink: 0;
            opacity: 0.55;
            letter-spacing: 0.5px;
            transition: all var(--transition);
            border-top: none;
            background: transparent;
            margin-top: 0;
            min-height: 26px;
        }
        .footer-bar a {
            color: var(--primary);
            text-decoration: none;
        }

        /* ===== Responsive (移除 .shortcut-hint 相关) ===== */
        @media (max-width:440px) {
            body {
                padding: var(--space-6);
            }
            .app {
                padding: var(--space-8) var(--space-10) var(--space-4) var(--space-10);
                border-radius: var(--space-16);
            }
            .app-header {
                padding: var(--space-6) 0 var(--space-12) 0;
                min-height: 48px;
            }
            .logo-icon {
                font-size: 28px;
            }
            .app-header .title {
                font-size: var(--text-xl);
            }
            .app-header .title small {
                font-size: var(--text-xs);
                padding: var(--space-2) var(--space-10);
            }
            .bpm-big {
                font-size: var(--text-2xl);
            }
            .app.immersive .bpm-big {
                font-size: var(--text-4xl);
            }
            .bpm-big .unit {
                font-size: var(--text-md);
            }
            .bpm-big .pre-sign {
                font-size: var(--text-base);
                right: -28px;
                top: -6px;
            }
            .bpm-big .rest-icon {
                font-size: var(--text-lg);
            }
            .vis-circle {
                max-width: 170px;
            }
            .app.immersive .vis-circle {
                max-width: 220px;
            }
            .visual-merged {
                padding: var(--space-12) var(--space-10);
                gap: var(--space-10);
            }
            .btn-grid {
                max-width: 280px;
                gap: var(--space-8);
            }
            .btn {
                font-size: var(--text-sm);
                min-height: 44px;
                padding: var(--space-10) var(--space-14);
            }
            .btn-start {
                font-size: var(--text-base);
                padding: var(--space-10) var(--space-16);
                min-height: 46px;
            }
            .btn-edge {
                font-size: var(--text-sm);
                min-height: 44px;
                padding: var(--space-10) var(--space-14);
            }
            .btn-params,
            .btn-reset {
                font-size: var(--text-sm);
                min-height: 44px;
                padding: var(--space-10) var(--space-14);
            }
            .data-row {
                font-size: var(--text-xs);
                gap: var(--space-14);
                min-height: 26px;
            }
            .data-row .data-item .data-val {
                font-size: var(--text-sm);
            }
            .progress-label {
                font-size: var(--text-xs);
                min-width: 40px;
            }
            .bpm-hero .countdown-overlay {
                font-size: var(--text-2xl);
            }
            .bpm-hero {
                padding: var(--space-8) 0 var(--space-6) 0;
                min-height: 90px;
            }
            .control-bar {
                min-height: 100px;
                padding: var(--space-4) 0 var(--space-4) 0;
            }
            .light-pull {
                width: 32px;
                height: 48px;
            }
            .pull-rope {
                height: 22px;
            }
            .light-pull.pulled .pull-rope {
                height: 36px;
            }
            .pull-ring {
                width: 22px;
                height: 22px;
                border-width: 2px;
            }
            .pull-ring .ring-inner {
                width: 7px;
                height: 7px;
            }
            .light-pull.pulled .pull-ring {
                transform: translateY(16px) scale(0.92);
            }
            .light-pull .pull-tooltip {
                display: none;
            }
            .status-badge .dot {
                width: 8px;
                height: 8px;
            }
            .status-badge .label {
                font-size: var(--text-xs);
            }
            .beat-progress-track {
                height: 10px;
            }
            .progress-track {
                height: 6px;
            }

            // 音频上下文（全局单例）
            let _audioCtx = null;

            function ensureAudio() {
                if (!_audioCtx) {
                    try {
                        _audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    } catch (_) { return null; }
                }
                if (_audioCtx && _audioCtx.state === 'suspended') {
                    try { _audioCtx.resume(); } catch (_) {}
                }
                return _audioCtx;
            }

            function playTick(freq = 880, vol = 0.10, dur = 0.035) {
                try {
                    const ctx = ensureAudio();
                    if (!ctx) return;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    const clampedFreq = Math.max(80, Math.min(1600, freq));
                    osc.frequency.value = clampedFreq;
                    gain.gain.setValueAtTime(Math.min(vol, 0.25), ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + Math.min(dur, 0.12));
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + Math.min(dur, 0.12));
                } catch (_) {}
            }

            function playClick() {
                try {
                    const ctx = ensureAudio();
                    if (!ctx) return;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(600, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.04);
                    gain.gain.setValueAtTime(0.05, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.05);
                } catch (_) {}
            }

            // ----- 策略类 -----
            class ModeStrategy {
                constructor() { this.name = 'base'; }
                init(s) { return s; }
                update(s, now) { return s; }
                getLabel() { return '基础'; }
                getDuration(s) { return 300; }
                _markJump(s, bpm, target) {
                    s._jumpLock = true;
                    s._jumpBpm = bpm;
                    s._jumpTarget = target;
                }
            }

            class FixedMode extends ModeStrategy {
                constructor() { super();
                    this.name = MODES.FIXED; }
                init(s) { s.bpm = s.params.bpm || 120;
                    s.targetBpm = s.bpm; return s; }
                update(s, now) { s.bpm = s.params.bpm || 120;
                    s.targetBpm = s.bpm; return s; }
                getLabel() { return '固定节奏'; }
                getDuration(s) { return (s.params.duration || 10) * 60; }
            }

            class VariationMode extends ModeStrategy {
                constructor() { super();
                    this.name = MODES.VARIATION; }
                init(s) {
                    const list = s.params.bpmList || [80, 120, 160, 100];
                    if (list.length === 0) { s.bpm = 120;
                        s.targetBpm = 120; return s; }
                    s.bpm = list[0];
                    s.targetBpm = list[0];
                    s.strategyState = { idx: 0, startTime: null, startBpm: list[0], targetBpm: list[0] };
                    return s;
                }
                update(s, now) {
                    const list = s.params.bpmList || [];
                    if (list.length === 0) { s.bpm = 120;
                        s.targetBpm = 120; return s; }
                    const interval = (s.params.interval || 4) * 1000;
                    const trans = s.params.transition || '渐变';
                    const st = s.strategyState;
                    const idx = st.idx % list.length;
                    const target = list[idx];
                    if (!st.startTime) {
                        st.startTime = now;
                        st.startBpm = s.bpm;
                        st.targetBpm = target;
                    }
                    const elapsed = now - st.startTime;
                    if (elapsed >= interval) {
                        st.idx = (st.idx + 1) % list.length;
                        const nextIdx = st.idx % list.length;
                        const nextTarget = list[nextIdx];
                        st.startTime = now;
                        st.startBpm = s.bpm;
                        st.targetBpm = nextTarget;
                        if (trans === '跳变') {
                            s.bpm = nextTarget;
                            s.targetBpm = nextTarget;
                            this._markJump(s, nextTarget, nextTarget);
                        }
                    } else {
                        if (trans === '渐变') {
                            const p = Math.min(elapsed / interval, 1);
                            const ease = 1 - Math.pow(1 - p, 2);
                            s.bpm = st.startBpm + (st.targetBpm - st.startBpm) * ease;
                            s.targetBpm = st.targetBpm;
                        } else {
                            s.bpm = st.targetBpm;
                            s.targetBpm = st.targetBpm;
                        }
                    }
                    return s;
                }
                getLabel() { return '变奏切换'; }
                getDuration(s) { return (s.params.duration || 10) * 60; }
            }

            class CooldownMode extends ModeStrategy {
                constructor() { super();
                    this.name = MODES.COOLDOWN; }
                init(s) {
                    s.bpm = s.params.startBpm || 180;
                    s.targetBpm = s.bpm;
                    s.strategyState = { startTime: null, startBpm: s.bpm, targetBpm: s.bpm };
                    return s;
                }
                update(s, now) {
                    const start = s.params.startBpm || 180,
                        end = s.params.endBpm || 60,
                        step = s.params.stepSize || 5,
                        interval = (s.params.stepInterval || 3) * 1000;
                    const trans = s.params.transition || '渐变';
                    if (s.bpm <= end) { s.bpm = end;
                        s.targetBpm = end; return s; }
                    const st = s.strategyState;
                    if (!st.startTime) {
                        st.startTime = now;
                        st.startBpm = s.bpm;
                        st.targetBpm = Math.max(end, s.bpm - step);
                    }
                    const elapsed = now - st.startTime;
                    if (elapsed >= interval) {
                        const newBpm = Math.max(end, s.bpm - step);
                        st.startTime = now;
                        st.startBpm = s.bpm;
                        st.targetBpm = Math.max(end, newBpm);
                        if (trans === '跳变') {
                            s.bpm = newBpm;
                            s.targetBpm = newBpm;
                            this._markJump(s, newBpm, newBpm);
                        }
                    } else {
                        if (trans === '渐变') {
                            const p = Math.min(elapsed / interval, 1);
                            const ease = 1 - Math.pow(1 - p, 2);
                            s.bpm = st.startBpm + (st.targetBpm - st.startBpm) * ease;
                            s.targetBpm = st.targetBpm;
                        } else {
                            s.bpm = st.targetBpm;
                            s.targetBpm = st.targetBpm;
                        }
                    }
                    return s;
                }
                getLabel() { return '渐冻模式'; }
                getDuration(s) {
                    const start = s.params.startBpm || 180,
                        end = s.params.endBpm || 60,
                        step = s.params.stepSize || 5,
                        interval = s.params.stepInterval || 3;
                    return Math.max(Math.ceil((start - end) / step) * interval, 30);
                }
            }

            class HeatupMode extends ModeStrategy {
                constructor() { super();
                    this.name = MODES.HEATUP; }
                init(s) {
                    s.bpm = s.params.startBpm || 60;
                    s.targetBpm = s.bpm;
                    s.strategyState = { startTime: null, startBpm: s.bpm, targetBpm: s.bpm };
                    return s;
                }
                update(s, now) {
                    const start = s.params.startBpm || 60,
                        end = s.params.endBpm || 180,
                        step = s.params.stepSize || 5,
                        interval = (s.params.stepInterval || 3) * 1000;
                    const trans = s.params.transition || '渐变';
                    if (s.bpm >= end) { s.bpm = end;
                        s.targetBpm = end; return s; }
                    const st = s.strategyState;
                    if (!st.startTime) {
                        st.startTime = now;
                        st.startBpm = s.bpm;
                        st.targetBpm = Math.min(end, s.bpm + step);
                    }
                    const elapsed = now - st.startTime;
                    if (elapsed >= interval) {
                        const newBpm = Math.min(end, s.bpm + step);
                        st.startTime = now;
                        st.startBpm = s.bpm;
                        st.targetBpm = Math.min(end, newBpm);
                        if (trans === '跳变') {
                            s.bpm = newBpm;
                            s.targetBpm = newBpm;
                            this._markJump(s, newBpm, newBpm);
                        }
                    } else {
                        if (trans === '渐变') {
                            const p = Math.min(elapsed / interval, 1);
                            const ease = 1 - Math.pow(1 - p, 2);
                            s.bpm = st.startBpm + (st.targetBpm - st.startBpm) * ease;
                            s.targetBpm = st.targetBpm;
                        } else {
                            s.bpm = st.targetBpm;
                            s.targetBpm = st.targetBpm;
                        }
                    }
                    return s;
                }
                getLabel() { return '渐热模式'; }
                getDuration(s) {
                    const start = s.params.startBpm || 60,
                        end = s.params.endBpm || 180,
                        step = s.params.stepSize || 5,
                        interval = s.params.stepInterval || 3;
                    return Math.max(Math.ceil((end - start) / step) * interval, 30);
                }
            }

            class RandomMode extends ModeStrategy {
                constructor() { super();
                    this.name = MODES.RANDOM; }
                init(s) {
                    const minB = s.params.minBpm || 60,
                        maxB = s.params.maxBpm || 200;
                    s.bpm = Math.round((minB + maxB) / 2);
                    s.targetBpm = s.bpm;
                    s.strategyState = { startTime: null, startBpm: s.bpm, targetBpm: s.bpm, duration: 3000,
                        lastBpm: s.bpm };
                    return s;
                }
                update(s, now) {
                    const minB = s.params.minBpm || 60,
                        maxB = s.params.maxBpm || 200;
                    const minInt = (s.params.minInterval || 2) * 1000,
                        maxInt = (s.params.maxInterval || 6) * 1000;
                    const trans = s.params.transition || '渐变';
                    const st = s.strategyState;
                    let lastBpm = st.lastBpm || s.bpm;
                    if (!st.startTime) {
                        st.startTime = now;
                        st.startBpm = s.bpm;
                        let nextBpm;
                        do { nextBpm = Math.round(Math.random() * (maxB - minB) + minB); } while (Math.abs(nextBpm -
                            lastBpm) < 5 && maxB - minB > 10);
                        st.lastBpm = nextBpm;
                        st.targetBpm = nextBpm;
                        st.duration = Math.random() * (maxInt - minInt) + minInt;
                    }
                    const elapsed = now - st.startTime;
                    if (elapsed >= st.duration) {
                        let nextBpm;
                        do { nextBpm = Math.round(Math.random() * (maxB - minB) + minB); } while (Math.abs(nextBpm - (
                            st.lastBpm || s.bpm)) < 5 && maxB - minB > 10);
                        st.lastBpm = nextBpm;
                        st.startTime = now;
                        st.startBpm = s.bpm;
                        st.targetBpm = nextBpm;
                        st.duration = Math.random() * (maxInt - minInt) + minInt;
                        if (trans === '跳变') {
                            s.bpm = nextBpm;
                            s.targetBpm = nextBpm;
                            this._markJump(s, nextBpm, nextBpm);
                        }
                    } else {
                        if (trans === '渐变') {
                            const p = Math.min(elapsed / st.duration, 1);
                            const ease = 1 - Math.pow(1 - p, 2);
                            s.bpm = st.startBpm + (st.targetBpm - st.startBpm) * ease;
                            s.targetBpm = st.targetBpm;
                        } else {
                            s.bpm = st.targetBpm;
                            s.targetBpm = st.targetBpm;
                        }
                    }
                    return s;
                }
                getLabel() { return '随机变奏'; }
                getDuration(s) { return (s.params.duration || 10) * 60; }
            }

            class WaveMode extends ModeStrategy {
                constructor() { super();
                    this.name = MODES.WAVE; }
                init(s) {
                    s.bpm = s.params.minBpm || 60;
                    s.targetBpm = s.bpm;
                    s.strategyState = { startTime: performance.now() };
                    return s;
                }
                update(s, now) {
                    const minB = s.params.minBpm || 60,
                        maxB = s.params.maxBpm || 200;
                    const period = (s.params.period || 30) * 1000;
                    const waveform = s.params.waveform || '正弦波';
                    const st = s.strategyState;
                    const elapsed = now - (st.startTime || now);
                    const t = (elapsed % period) / period;
                    let ratio;
                    switch (waveform) {
                        case '正弦波':
                            ratio = (Math.sin(t * 2 * Math.PI - Math.PI / 2) + 1) / 2;
                            break;
                        case '三角波':
                            ratio = 1 - Math.abs(2 * (t - Math.floor(t + 0.5)));
                            break;
                        case '方波':
                            ratio = Math.floor(t * 2) % 2;
                            break;
                        default:
                            ratio = (Math.sin(t * 2 * Math.PI - Math.PI / 2) + 1) / 2;
                    }
                    s.bpm = minB + (maxB - minB) * Math.max(0, Math.min(1, ratio));
                    s.targetBpm = s.bpm;
                    return s;
                }
                getLabel() { return '波浪模式'; }
                getDuration(s) { return (s.params.duration || 10) * 60; }
            }

            class ChaseMode extends ModeStrategy {
                constructor() { super();
                    this.name = MODES.CHASE; }
                init(s) {
                    s.bpm = s.params.safeBpm || 90;
                    s.targetBpm = s.bpm;
                    s.strategyState = { inChase: false, nextChaseTime: 0, chaseEndTime: 0, chaseDuration: 0,
                        chaseStartTime: 0, chaseStartBpm: 90, chaseTargetBpm: 170 };
                    return s;
                }
                update(s, now) {
                    const safe = s.params.safeBpm || 90,
                        hunt = s.params.huntBpm || 170;
                    const minGap = (s.params.minGap || 15) * 1000,
                        maxGap = (s.params.maxGap || 45) * 1000;
                    const minHunt = (s.params.minHunt || 8) * 1000,
                        maxHunt = (s.params.maxHunt || 15) * 1000;
                    const trans = s.params.transition || '跳变';
                    const st = s.strategyState;
                    if (!st.inChase) {
                        if (!st.nextChaseTime) st.nextChaseTime = now + Math.random() * (maxGap - minGap) + minGap;
                        if (now >= st.nextChaseTime) {
                            st.inChase = true;
                            st.chaseDuration = Math.random() * (maxHunt - minHunt) + minHunt;
                            st.chaseEndTime = now + st.chaseDuration;
                            st.chaseStartBpm = s.bpm;
                            st.chaseTargetBpm = hunt;
                            st.chaseStartTime = now;
                            if (trans === '跳变') {
                                s.bpm = hunt;
                                s.targetBpm = hunt;
                                this._markJump(s, hunt, hunt);
                            }
                            st.nextChaseTime = 0;
                        } else {
                            if (s.bpm !== safe) {
                                if (trans === '跳变') {
                                    s.bpm = safe;
                                    s.targetBpm = safe;
                                    this._markJump(s, safe, safe);
                                } else {
                                    s.bpm += (safe - s.bpm) * 0.02;
                                    s.targetBpm = safe;
                                }
                            }
                        }
                    } else {
                        if (now >= st.chaseEndTime) {
                            st.inChase = false;
                            st.nextChaseTime = now + Math.random() * (maxGap - minGap) + minGap;
                            if (trans === '跳变') {
                                s.bpm = safe;
                                s.targetBpm = safe;
                                this._markJump(s, safe, safe);
                            }
                        } else {
                            if (trans === '跳变') {
                                s.bpm = hunt;
                                s.targetBpm = hunt;
                            } else {
                                const p = Math.min((now - st.chaseStartTime) / st.chaseDuration, 1);
                                const ease = 1 - Math.pow(1 - p, 2);
                                s.bpm = st.chaseStartBpm + (st.chaseTargetBpm - st.chaseStartBpm) * ease;
                                s.targetBpm = hunt;
                            }
                        }
                    }
                    return s;
                }
                getLabel() { return '追逃模式'; }
                getDuration(s) { return (s.params.duration || 15) * 60; }
            }

            const modeFactory = {
                [MODES.FIXED]: () => new FixedMode(),
                [MODES.VARIATION]: () => new VariationMode(),
                [MODES.COOLDOWN]: () => new CooldownMode(),
                [MODES.HEATUP]: () => new HeatupMode(),
                [MODES.RANDOM]: () => new RandomMode(),
                [MODES.WAVE]: () => new WaveMode(),
                [MODES.CHASE]: () => new ChaseMode(),
            };

            let currentStrategy = new FixedMode();

            // =========================================================================
            //  七、休息状态管理
            // =========================================================================

            function enterRestState() {
                if (!LRE.running || LRE.resting || LRE.countdownActive) return;
                LRE.restOriginalBpm = Math.max(10, Math.min(300, LRE.bpm));
                LRE.restCurrentBpm = LRE.restOriginalBpm;
                LRE.resting = true;
                LRE.restPhase = 'down';
                LRE.restStartTime = performance.now();
                LRE.restPhaseStartTime = LRE.restStartTime;
                LRE.restProgress = 0;
                LRE.restPhaseProgress = 0;
                LRE.restTriggeredAt = performance.now();

                if (LRE.tickTimer) {
                    clearTimeout(LRE.tickTimer);
                    LRE.tickTimer = null;
                }

                LRE.edgeCount++;
                edgeCount.textContent = LRE.edgeCount;
                dataEdge.textContent = LRE.edgeCount;

                app.classList.add('resting-active');
                btnEdge.classList.add('resting-btn');
                btnEdge.textContent = '🧘 休息中';

                restProgressWrap.classList.add('show');
                restProgressFill.style.width = '0%';

                showToast('🧘 进入休息', `5秒降至0 BPM · 保持15秒 · 5秒回升`);
                playClick();

                for (const p of LRE.pulses) { p.active = false;
                    p.alpha = 0;
                    p.scale = 1;
                    p.blur = 0; }
                LRE.canvasGlowTarget = 0.06;
                updateUI();
                renderPulse();
            }

            function updateRestState(now) {
                if (!LRE.resting) return;
                const elapsed = now - LRE.restStartTime;
                const total = LRE.restTotalDuration;
                LRE.restProgress = Math.min(elapsed / total, 1);
                let bpm = 0;
                let phase = LRE.restPhase;
                let phaseElapsed = now - LRE.restPhaseStartTime;

                switch (phase) {
                    case 'down': {
                        const dur = LRE.restDownDuration;
                        const p = Math.min(phaseElapsed / dur, 1);
                        bpm = LRE.restOriginalBpm * (1 - p);
                        LRE.restPhaseProgress = p;
                        if (p >= 1) { bpm = 0;
                            LRE.restPhase = 'hold';
                            LRE.restPhaseStartTime = now;
                            LRE.restPhaseProgress = 0;
                            playClick(); }
                        break;
                    }
                    case 'hold': {
                        const dur = LRE.restHoldDuration;
                        const p = Math.min(phaseElapsed / dur, 1);
                        bpm = 0;
                        LRE.restPhaseProgress = p;
                        if (p >= 1) { LRE.restPhase = 'up';
                            LRE.restPhaseStartTime = now;
                            LRE.restPhaseProgress = 0;
                            playClick(); }
                        break;
                    }
                    case 'up': {
                        const dur = LRE.restUpDuration;
                        const p = Math.min(phaseElapsed / dur, 1);
                        bpm = LRE.restOriginalBpm * p;
                        LRE.restPhaseProgress = p;
                        if (p >= 1) { bpm = LRE.restOriginalBpm;
                            exitRestState(); return; }
                        break;
                    }
                    default: { bpm = LRE.restOriginalBpm;
                        exitRestState(); return; }
                }

                LRE.restCurrentBpm = Math.max(0, Math.min(300, bpm));
                LRE.bpm = LRE.restCurrentBpm;
                LRE.targetBpm = LRE.restCurrentBpm;
                restProgressFill.style.width = (LRE.restProgress * 100) + '%';
                updateUI();
                beatProgressFill.style.width = '0%';
                beatProgressFill.classList.remove('show-head');

                if (LRE.elapsed >= LRE.totalDuration) stopEngine();
            }

            function exitRestState() {
                if (!LRE.resting) return;
                LRE.resting = false;
                LRE.restPhase = null;
                LRE.restCurrentBpm = LRE.restOriginalBpm;

                // 退出休息时同步策略目标
                const strategyTarget = currentStrategy.targetBpm || LRE.restOriginalBpm;
                LRE.bpm = Math.max(40, Math.min(220, strategyTarget));
                LRE.targetBpm = LRE.bpm;

                app.classList.remove('resting-active');
                btnEdge.classList.remove('resting-btn');
                btnEdge.textContent = '🔴 边缘 ';
                restProgressWrap.classList.remove('show');
                restProgressFill.style.width = '0%';

                if (LRE.running) {
                    LRE.lastBeatTime = performance.now();
                    LRE._lastScheduledBpm = LRE.bpm;
                    scheduleTick();
                }

                showToast('✅ 休息结束', `恢复至 ${Math.round(LRE.bpm)} BPM`);
                LRE.canvasGlowTarget = 0.04;
                for (const p of LRE.pulses) {
                    p.active = true;
                    p.startTime = performance.now();
                    p.progress = 0;
                    p.scale = 1;
                    p.alpha = 0;
                    p.blur = 0;
                    p.targetScale = 1.06;
                    p.targetAlpha = 0.20;
                    p.targetBlur = 6;
                    p.duration = 100;
                    p.thickness = 0.06;
                }
                updateUI();
                renderPulse();
            }

            // =========================================================================
            //  八、核心更新函数
            // =========================================================================

            function applyJumpBpm(newBpm, newTarget) {
                if (!LRE.running || LRE.resting) return;
                const clamped = Math.max(40, Math.min(220, newBpm));
                const clampedTarget = Math.max(40, Math.min(220, newTarget || newBpm));

                LRE.bpm = clamped;
                LRE.targetBpm = clampedTarget;
                LRE.beatInterval = 60000 / Math.max(clamped, 10);
                LRE._lastScheduledBpm = clamped;

                if (LRE.tickTimer) {
                    clearTimeout(LRE.tickTimer);
                    LRE.tickTimer = null;
                }

                LRE.lastBeatTime = performance.now() - LRE.beatInterval * 0.25;
                LRE.beatPhase = 0;
                LRE._lastJumpTime = performance.now();

                triggerBeat();
                scheduleTick();
                updateUI();
                renderPulse();
            }

            function updateLRE(now) {
                if (!LRE.running) return;
                const dt = Math.min(16, now - (LRE._lastUpdate || now));
                LRE._lastUpdate = now;
                LRE.delta = dt;
                LRE.now = now;

                if (LRE.resting) {
                    updateRestState(now);
                    updateDOMForRest();
                    renderPulse();
                    return;
                }

                currentStrategy.update(LRE, now);

                // 跳变检测
                if (LRE._jumpLock && LRE.running && !LRE.resting) {
                    const jumpBpm = Math.max(40, Math.min(220, LRE._jumpBpm));
                    const jumpTarget = Math.max(40, Math.min(220, LRE._jumpTarget || jumpBpm));
                    applyJumpBpm(jumpBpm, jumpTarget);
                    LRE._jumpLock = false;
                }

                // 动态保护期
                const protectTime = Math.min(LRE.beatInterval * 0.6, 600);
                if (LRE._lastJumpTime && (now - LRE._lastJumpTime) < protectTime) {
                    // 保护期
                } else {
                    LRE.bpm = Math.max(40, Math.min(220, LRE.bpm));
                    LRE.targetBpm = Math.max(40, Math.min(220, LRE.targetBpm));
                }

                LRE.bpmSum += LRE.bpm;
                LRE.bpmCount++;
                if (LRE.bpm > LRE.maxBpm) LRE.maxBpm = LRE.bpm;

                LRE.beatInterval = 60000 / Math.max(LRE.bpm, 10);
                const beatElapsed = now - LRE.lastBeatTime;
                LRE.beatPhase = Math.min(beatElapsed / LRE.beatInterval, 1);

                const energyDiff = LRE.energyTarget - LRE.energy;
                LRE.energyVelocity += energyDiff * 0.08;
                LRE.energyVelocity *= 0.92;
                LRE.energy += LRE.energyVelocity * dt / 16;
                LRE.energy = Math.max(0, Math.min(100, LRE.energy));
                LRE.momentum *= 0.998;
                LRE.momentum = Math.max(0, LRE.momentum);
                if (LRE.energy > 20) LRE.momentum += (LRE.energy - 20) * 0.001;
