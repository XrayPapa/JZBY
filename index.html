                LRE.energyTarget *= 0.998;
                if (LRE.energyTarget < 0.1) LRE.energyTarget = 0;

                const e = LRE.energy / 100;
                const ambientHero = 1 + 0.008 * Math.sin(now / 4000 + LRE.dom.ambientPhase);
                const energyHero = e * 0.035;
                LRE.dom.heroScale = ambientHero + energyHero + (LRE.dom._heroBeatBoost || 0);
                LRE.dom.heroScale = Math.max(0.98, Math.min(1.08, LRE.dom.heroScale));
                const ambientY = 0.6 * Math.sin(now / 5000 + LRE.dom.ambientPhase * 0.7);
                const energyY = -e * 2.5;
                LRE.dom.heroY = ambientY + energyY + (LRE.dom._heroYBoost || 0);
                LRE.dom.heroShadow = 4 + e * 20 + (LRE.dom._heroShadowBoost || 0);
                const ambientBpm = 1 + 0.004 * Math.sin(now / 3000 + LRE.dom.ambientPhase * 1.2);
                LRE.dom.bpmScale = ambientBpm + e * 0.08 + (LRE.dom._bpmScaleBoost || 0);
                LRE.dom.bpmGlow = e * 0.6 + (LRE.dom._bpmGlowBoost || 0);
                LRE.dom.beatWidth *= 0.88;
                if (LRE.dom.beatWidth < 0.001) LRE.dom.beatWidth = 0;
                LRE.dom.progressHead = e * 0.8 + (LRE.dom._headBoost || 0);
                LRE.dom.bgFlash *= 0.94;
                if (LRE.dom.bgFlash < 0.001) LRE.dom.bgFlash = 0;
                LRE.canvasGlow += (LRE.canvasGlowTarget - LRE.canvasGlow) * 0.10;
                if (Math.abs(LRE.canvasGlow) < 0.0005) LRE.canvasGlow = 0;
                LRE.canvasGlowTarget *= 0.97;
                if (LRE.canvasGlowTarget < 0.0005) LRE.canvasGlowTarget = 0;

                // BPM数字滚动动画
                const bpmTarget = Math.round(LRE.bpm);
                if (LRE.dom._bpmDisplayTarget !== bpmTarget) {
                    LRE.dom._bpmDisplayTarget = bpmTarget;
                }
                const diff = LRE.dom._bpmDisplayTarget - LRE.dom._bpmDisplay;
                if (Math.abs(diff) > 0.01) {
                    LRE.dom._bpmDisplay += diff * Math.min(1, dt / 80);
                    if (Math.abs(LRE.dom._bpmDisplay - LRE.dom._bpmDisplayTarget) < 0.1) {
                        LRE.dom._bpmDisplay = LRE.dom._bpmDisplayTarget;
                    }
                    bpmNumber.textContent = Math.round(LRE.dom._bpmDisplay);
                } else {
                    bpmNumber.textContent = bpmTarget;
                }

                updatePulses(now);
                updateCore(now);
                renderPulse();
                applyDOM();
                updateUI();
                updateProgress();
                decayBeatBoosts();
            }

            function updateDOMForRest() {
                const d = LRE.dom;
                const bpm = LRE.restCurrentBpm || 0;
                bpmNumber.textContent = Math.round(bpm);

                const phase = LRE.restPhase;
                preSign.className = 'pre-sign';
                if (phase === 'down') {
                    preSign.className = 'pre-sign show down';
                    preSign.textContent = '↓';
                } else if (phase === 'hold') {
                    preSign.className = 'pre-sign show rest';
                    preSign.textContent = '—';
                } else if (phase === 'up') {
                    preSign.className = 'pre-sign show up';
                    preSign.textContent = '↑';
                } else {
                    preSign.textContent = '—';
                }

                restIcon.classList.add('show');
                bpmBig.classList.add('resting-color');
                bpmBig.classList.remove('warn');
                bpmModeLabel.textContent = '🧘 休息中';
                bpmModeLabel.classList.add('resting-label');
                statusDot.className = 'dot resting-dot';
                statusLabel.textContent = '休息中';
                statusLabel.classList.add('resting-label');
                beatProgressFill.classList.add('resting-fill');
                beatProgressFill.style.width = '0%';
                beatProgressFill.classList.remove('show-head');
                bpmRing.classList.add('resting-ring');
                bpmRing.classList.remove('warn');
                app.style.background = 'var(--surface)';
                app.style.backgroundColor = 'var(--surface)';
                btnEdge.classList.add('resting-btn');
                btnEdge.textContent = '🧘 休息中';

                const meta = MODE_META[LRE.mode] || { label: '固定', icon: '🔊' };
                currentModeDisplay.textContent = meta.label;
                currentModeDisplay.classList.add('resting');

                dataEdge.textContent = LRE.edgeCount;
                const mins = Math.floor(LRE.elapsed / 60);
                const secs = Math.floor(LRE.elapsed % 60);
                dataTime.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
                dataMax.textContent = LRE.maxBpm > 0 ? Math.round(LRE.maxBpm) : '—';
                dataAvg.textContent = LRE.bpmCount > 0 ? Math.round(LRE.bpmSum / LRE.bpmCount) : '—';

                restProgressWrap.classList.add('show');
                restProgressFill.style.width = (LRE.restProgress * 100) + '%';
                btnStart.style.transform = 'scale(1)';
            }

            function updatePulses(now) {
                for (const layer of LRE.pulses) {
                    if (!layer.active) {
                        layer.alpha *= 0.94;
                        layer.blur *= 0.94;
                        if (layer.alpha < 0.001) layer.alpha = 0;
                        if (layer.blur < 0.1) layer.blur = 0;
                        continue;
                    }
                    const elapsed = now - layer.startTime;
                    if (elapsed < 0) continue;
                    const p = Math.min(elapsed / layer.duration, 1);
                    layer.progress = p;
                    const scaleDelta = (layer.targetScale - 1) * (1 - Math.pow(1 - p, 3));
                    layer.scale = 1 + scaleDelta;
                    const alphaRise = Math.min(p * 4, 1);
                    const alphaFall = 1 - Math.pow(p, 1.6);
                    layer.alpha = layer.targetAlpha * alphaRise * alphaFall;
                    const blurRise = Math.min(p * 3, 1);
                    const blurFall = 1 - Math.pow(p, 0.9);
                    layer.blur = layer.targetBlur * blurRise * blurFall;
                    if (p >= 1) {
                        layer.active = false;
                        layer.alpha = 0;
                        layer.blur = 0;
                        layer.scale = 1;
                    }
                }
            }

            function updateCore(now) {
                const e = LRE.energy / 100;
                const breath = 0.92 + 0.08 * Math.sin(now / 600 + LRE.dom.ambientPhase * 1.7);
                const beatBoost = LRE.dom._heroBeatBoost || 0;
                LRE.core.radius = 0.06 + 0.07 * e + 0.04 * breath + 0.06 * beatBoost * 6;
                LRE.core.alpha = 0.45 + 0.55 * e + 0.15 * breath;
                LRE.core.glow = 0.15 + 0.50 * e + 0.25 * beatBoost * 5;
                LRE.core.breath = breath;
            }

            function triggerBeat() {
                if (LRE.resting) return;
                const now = performance.now();
                LRE.lastBeatTime = now;
                const intensity = Math.min((LRE.bpm - 30) / 220, 1) * 0.8 + 0.2;
                LRE.energyTarget = Math.min(100, LRE.energyTarget + 22 + 14 * intensity);
                LRE.canvasGlowTarget = 0.10 * intensity;

                const layerConfigs = [
                    { delay: 0, scale: 1.12, alpha: 0.60, blur: 6, dur: 70, thick: 0.10 },
                    { delay: 40, scale: 1.28, alpha: 0.48, blur: 16, dur: 130, thick: 0.075 },
                    { delay: 85, scale: 1.52, alpha: 0.32, blur: 30, dur: 230, thick: 0.050 },
                    { delay: 150, scale: 1.85, alpha: 0.20, blur: 48, dur: 380, thick: 0.032 },
                    { delay: 240, scale: 2.25, alpha: 0.12, blur: 70, dur: 580, thick: 0.018 },
                ];
                for (let i = 0; i < LRE.pulses.length && i < layerConfigs.length; i++) {
                    const cfg = layerConfigs[i];
                    const layer = LRE.pulses[i];
                    const intScale = 0.7 + 0.3 * intensity;
                    layer.active = true;
                    layer.startTime = now + cfg.delay;
                    layer.progress = 0;
                    layer.scale = 1;
                    layer.alpha = 0;
                    layer.blur = 0;
                    layer.targetScale = 1 + (cfg.scale - 1) * intScale;
                    layer.targetAlpha = cfg.alpha * (0.7 + 0.3 * intensity);
                    layer.targetBlur = cfg.blur * (0.7 + 0.3 * intensity);
                    layer.duration = cfg.dur * (0.8 + 0.4 * intensity);
                    layer.thickness = cfg.thick;
                }
                const beatIntensity = intensity;
                LRE.dom._heroBeatBoost = 0.030 * beatIntensity;
                LRE.dom._heroYBoost = -3.0 * beatIntensity;
                LRE.dom._heroShadowBoost = 15 * beatIntensity;
                LRE.dom._bpmScaleBoost = 0.12 * beatIntensity;
                LRE.dom._bpmGlowBoost = 0.6 * beatIntensity;
                LRE.dom._headBoost = 0.7 * beatIntensity;
                LRE.dom.bgFlash = 0.7 * beatIntensity;
                LRE.dom.beatWidth = 1.0;
                const freq = 860 + (LRE.bpm / 250) * 180;
                playTick(freq, 0.12, 0.035);
            }

            function decayBeatBoosts() {
                const decay = 0.88;
                if (LRE.dom._heroBeatBoost) { LRE.dom._heroBeatBoost *= decay; if (Math.abs(LRE.dom._heroBeatBoost) <
                        0.0005) LRE.dom._heroBeatBoost = 0; }
                if (LRE.dom._heroYBoost) { LRE.dom._heroYBoost *= decay; if (Math.abs(LRE.dom._heroYBoost) < 0.01) LRE
                        .dom._heroYBoost = 0; }
                if (LRE.dom._heroShadowBoost) { LRE.dom._heroShadowBoost *= decay; if (Math.abs(LRE.dom
                        ._heroShadowBoost) < 0.1) LRE.dom._heroShadowBoost = 0; }
                if (LRE.dom._bpmScaleBoost) { LRE.dom._bpmScaleBoost *= decay; if (Math.abs(LRE.dom._bpmScaleBoost) <
                        0.001) LRE.dom._bpmScaleBoost = 0; }
                if (LRE.dom._bpmGlowBoost) { LRE.dom._bpmGlowBoost *= decay; if (Math.abs(LRE.dom._bpmGlowBoost) <
                        0.001) LRE.dom._bpmGlowBoost = 0; }
                if (LRE.dom._headBoost) { LRE.dom._headBoost *= decay; if (Math.abs(LRE.dom._headBoost) < 0.001) LRE
                        .dom._headBoost = 0; }
            }

            function applyDOM() {
                const d = LRE.dom;
                bpmHero.style.transform =
                    `scale(${d.heroScale}) translateY(${d.heroY}px)`;
                bpmHero.style.boxShadow =
                    `0 ${4 + d.heroShadow * 0.3}px ${20 + d.heroShadow * 1.5}px ${getPrimary(0.04 + d.heroShadow * 0.004)}`;
                bpmBig.style.transform = `scale(${d.bpmScale})`;
                bpmBig.style.textShadow = d.bpmGlow > 0.01 ?
                    `0 0 ${d.bpmGlow * 40}px ${getPrimary(0.3)}` :
                    'none';

                // ✅ 修复：使用正弦波实现进度条来回摆动
                const beatPulse = Math.sin(LRE.beatPhase * Math.PI);
                const beatPercent = Math.max(0, Math.min(1, beatPulse)) * 100;
                beatProgressFill.style.width = beatPercent + '%';
                beatProgressFill.classList.toggle('show-head', beatPulse > 0.3);

                const bf = d.bgFlash;
                if (bf > 0.001) {
                    if (currentTheme === 'dark') {
                        app.style.background = `rgba(0, 136, 255, ${bf * 0.015})`;
                        app.style.backgroundColor = 'var(--surface)';
                    } else {
                        app.style.background = getPrimary(bf * 0.05);
                    }
                } else {
                    app.style.background = 'var(--surface)';
                    app.style.backgroundColor = 'var(--surface)';
                }
                if (LRE.running && !LRE.resting) {
                    const breath = 1 + 0.008 * Math.sin(LRE.now / 3000 + d.ambientPhase);
                    const pulse = 1 + (1 - d.bpmScale) * 0.3;
                    btnStart.style.transform = `scale(${breath * pulse})`;
                } else {
                    const breath = 1 + 0.012 * Math.sin(LRE.now / 3000 + d.ambientPhase);
                    btnStart.style.transform = `scale(${breath})`;
                }
                if (LRE.edgeCount > 0 && !LRE.resting) {
                    const flash = 0.5 + 0.5 * Math.sin(LRE.now / 600 + d.ambientPhase * 0.5);
                    btnEdge.style.borderColor =
                        `rgba(239,68,68,${0.2 + 0.3 * flash})`;
                }
                decayBeatBoosts();
            }

            // =========================================================================
            //  九、Pulse 渲染器
            // =========================================================================
            function renderPulse() {
                const c = pulseCanvas;
                const w = c._w || 200,
                    h = c._h || 200;
                const dpr = c._dpr || 1;
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.clearRect(0, 0, c.width, c.height);
                ctx.scale(dpr, dpr);
                const cx = w / 2,
                    cy = h / 2;
                const maxR = Math.min(w, h) * 0.44;

                const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR);
                const isDark = currentTheme === 'dark';
                const isResting = LRE.resting;
                if (isResting) {
                    bgGrad.addColorStop(0, getRest(0.08));
                    bgGrad.addColorStop(0.5, getRest(0.03));
                } else if (isDark) {
                    bgGrad.addColorStop(0, 'rgba(0, 136, 255, 0.06)');
                    bgGrad.addColorStop(0.5, 'rgba(0, 136, 255, 0.025)');
                } else {
                    bgGrad.addColorStop(0, 'rgba(124, 58, 237, 0.06)');
                    bgGrad.addColorStop(0.5, 'rgba(124, 58, 237, 0.025)');
                }
                bgGrad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = bgGrad;
                ctx.beginPath();
                ctx.arc(cx, cy, maxR, 0, Math.PI * 2);
                ctx.fill();

                for (let pass = 0; pass < 2; pass++) {
                    const isBloom = pass === 0;
                    for (let i = LRE.pulses.length - 1; i >= 0; i--) {
                        const layer = LRE.pulses[i];
                        if (layer.alpha < 0.002) continue;
                        const radius = maxR * layer.scale * 0.88;
                        const thickness = maxR * (layer.thickness || 0.06) * 1.2;
                        const innerR = Math.max(2, radius - thickness / 2);
                        const outerR = radius + thickness / 2;
                        const alphaFactor = isBloom ? 0.40 : 1.0;
                        const finalAlpha = Math.min(layer.alpha * alphaFactor, 0.65);
                        if (finalAlpha < 0.002) continue;

                        const grad = ctx.createRadialGradient(cx, cy, innerR, cx, cy, outerR);
                        let primaryCol, primaryLightCol, whiteCol;
                        if (isResting) {
                            primaryCol = getRest(Math.min(finalAlpha * 1.0, 0.8));
                            primaryLightCol = getRest(Math.min(finalAlpha * 0.8, 0.7));
                            whiteCol = getWhite(Math.min(finalAlpha * 0.8, 0.6));
                        } else {
                            primaryCol = getPrimaryVivid(Math.min(finalAlpha * 1.0, 0.8));
                            primaryLightCol = getPrimaryLight(Math.min(finalAlpha * 0.8, 0.7));
                            whiteCol = getWhite(Math.min(finalAlpha * 0.8, 0.6));
                        }

                        if (isBloom) {
                            const glowCol = isResting ? getRest(finalAlpha * 0.25) : getPrimaryGlow(finalAlpha * 0.25);
                            grad.addColorStop(0, glowCol);
                            grad.addColorStop(0.3, glowCol);
                            grad.addColorStop(0.7, glowCol);
                            grad.addColorStop(1, 'rgba(0,0,0,0)');
                        } else {
                            grad.addColorStop(0, getWhite(Math.min(finalAlpha * 1.2, 0.8)));
                            grad.addColorStop(0.12, getWhite(Math.min(finalAlpha * 0.7, 0.6)));
                            grad.addColorStop(0.35, primaryLightCol);
                            grad.addColorStop(0.65, primaryCol);
                            grad.addColorStop(1, 'rgba(0,0,0,0)');
                        }

                        ctx.beginPath();
                        ctx.arc(cx, cy, outerR, 0, Math.PI * 2);
                        ctx.arc(cx, cy, innerR, 0, Math.PI * 2, true);
                        ctx.closePath();

                        if (isBloom) {
                            const glowCol = isResting ? getRest(finalAlpha * 0.15) : getPrimaryGlow(finalAlpha * 0.15);
                            ctx.shadowColor = glowCol;
                            ctx.shadowBlur = Math.max(25, layer.blur * 3.0 + 18);
                        } else {
                            const glowCol = isResting ? getRest(finalAlpha * 0.20) : getPrimaryGlow(finalAlpha * 0.20);
                            ctx.shadowColor = glowCol;
                            ctx.shadowBlur = Math.max(5, layer.blur * 0.9 + 4);
                        }
                        ctx.fillStyle = grad;
                        ctx.fill();
                        ctx.shadowBlur = 0;

                        if (!isBloom && finalAlpha > 0.05) {
                            const strokeAlpha = finalAlpha * 0.20;
                            ctx.beginPath();
                            ctx.arc(cx, cy, outerR * 0.96, 0, Math.PI * 2);
                            const strokeCol = isResting ? getRest(strokeAlpha) : getPrimaryLight(strokeAlpha);
                            ctx.strokeStyle = strokeCol;
                            ctx.lineWidth = Math.max(0.8, 1.5 + layer.blur * 0.05);
                            const shadowCol = isResting ? getRest(strokeAlpha * 0.4) : getPrimaryGlow(strokeAlpha * 0.4);
                            ctx.shadowColor = shadowCol;
                            ctx.shadowBlur = Math.max(3, layer.blur * 0.4);
                            ctx.stroke();
                            ctx.shadowBlur = 0;
                        }
                    }
                }

                const core = LRE.core;
                const coreR = maxR * Math.max(0.035, core.radius);
                const coreA = Math.min(core.alpha, 0.92);
                if (coreR > 1 && coreA > 0.01 && !isResting) {
                    const glowR = coreR * (3.0 + 2.0 * core.glow);
                    const glowGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
                    const glowAlpha = coreA * 0.25 * core.glow;
                    glowGrad.addColorStop(0, getPrimaryLight(glowAlpha * 0.7));
                    glowGrad.addColorStop(0.3, getPrimaryVivid(glowAlpha * 0.4));
                    glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = glowGrad;
                    ctx.shadowColor = getPrimaryGlow(glowAlpha * 0.3);
                    ctx.shadowBlur = Math.max(12, glowR * 0.5);
                    ctx.beginPath();
                    ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    const coreGrad = ctx.createRadialGradient(cx - coreR * 0.15, cy - coreR * 0.15, 0, cx, cy, coreR);
                    const whiteA = Math.min(coreA * 1.3, 0.98);
                    const primaryA = Math.min(coreA * 0.8, 0.7);
                    coreGrad.addColorStop(0, getWhite(whiteA));
                    coreGrad.addColorStop(0.25, getWhite(coreA * 0.8));
                    coreGrad.addColorStop(0.55, getPrimaryLight(primaryA));
                    coreGrad.addColorStop(0.85, getPrimaryVivid(primaryA * 0.8));
                    coreGrad.addColorStop(1, getPrimary(primaryA * 0.6));
                    ctx.fillStyle = coreGrad;
                    ctx.shadowColor = getPrimaryGlow(coreA * 0.25);
                    ctx.shadowBlur = Math.max(6, coreR * 0.8);
                    ctx.beginPath();
                    ctx.arc(cx, cy, coreR, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    const hlR = coreR * 0.45;
                    const hlGrad = ctx.createRadialGradient(cx - coreR * 0.2, cy - coreR * 0.25, 0, cx, cy, hlR);
                    hlGrad.addColorStop(0, `rgba(255,255,255,${Math.min(coreA * 0.7, 0.6)})`);
                    hlGrad.addColorStop(0.5, `rgba(255,255,255,${coreA * 0.2})`);
                    hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.fillStyle = hlGrad;
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.arc(cx, cy, hlR, 0, Math.PI * 2);
                    ctx.fill();

                    const innerGlowR = coreR * 1.5;
                    const igGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, innerGlowR);
                    igGrad.addColorStop(0, getPrimaryLight(coreA * 0.10));
                    igGrad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = igGrad;
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.arc(cx, cy, innerGlowR, 0, Math.PI * 2);
                    ctx.fill();
                }

                if (LRE.canvasGlow > 0.003 && !isResting) {
                    const gR = maxR * (0.75 + 0.25 * LRE.canvasGlow * 3);
                    const gg = ctx.createRadialGradient(cx, cy, maxR * 0.15, cx, cy, gR);
                    const ga = 0.02 + 0.08 * LRE.canvasGlow * 2;
                    if (isDark) {
                        gg.addColorStop(0, 'rgba(0, 136, 255, 0)');
                        gg.addColorStop(0.3, `rgba(0, 136, 255, ${ga * 0.4})`);
                        gg.addColorStop(1, `rgba(0, 136, 255, ${ga})`);
                    } else {
                        gg.addColorStop(0, 'rgba(124, 58, 237, 0)');
                        gg.addColorStop(0.3, `rgba(124, 58, 237, ${ga * 0.4})`);
                        gg.addColorStop(1, `rgba(124, 58, 237, ${ga})`);
                    }
                    ctx.fillStyle = gg;
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.arc(cx, cy, gR, 0, Math.PI * 2);
                    ctx.fill();
                }

                if (isResting) {
                    const rR = maxR * 0.60;
                    const rGrad = ctx.createRadialGradient(cx, cy, rR * 0.3, cx, cy, rR);
                    const breathe = 0.6 + 0.4 * Math.sin(performance.now() / 800 + LRE.dom.ambientPhase);
                    rGrad.addColorStop(0, getRest(0.03 * breathe));
                    rGrad.addColorStop(0.5, getRest(0.06 * breathe));
                    rGrad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = rGrad;
                    ctx.shadowColor = getRest(0.05 * breathe);
                    ctx.shadowBlur = 40;
                    ctx.beginPath();
                    ctx.arc(cx, cy, rR, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    const dotR = maxR * 0.06;
                    const dotGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, dotR);
                    dotGrad.addColorStop(0, getRest(0.4 * breathe));
                    dotGrad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = dotGrad;
                    ctx.beginPath();
                    ctx.arc(cx, cy, dotR, 0, Math.PI * 2);
                    ctx.fill();
                }

                const edgeGlow = Math.min(LRE.edgeCount / 30, 1) * 0.04;
                if (edgeGlow > 0.002 && !isResting) {
                    ctx.fillStyle = getEdge(edgeGlow);
                    ctx.fillRect(0, 0, w, h);
                }
                ctx.setTransform(1, 0, 0, 1, 0, 0);
            }

            function resizePulse() {
                const rect = pulseCanvas.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                const w = rect.width || 160,
                    h = rect.height || 160;
                pulseCanvas.width = w * dpr;
                pulseCanvas.height = h * dpr;
                pulseCanvas.style.width = w + 'px';
                pulseCanvas.style.height = h + 'px';
                pulseCanvas._dpr = dpr;
                pulseCanvas._w = w;
                pulseCanvas._h = h;
            }
            window.addEventListener('resize', resizePulse);
            window.addEventListener('orientationchange', function() {
                setTimeout(resizePulse, 200);
            });
            setTimeout(resizePulse, 50);

            // =========================================================================
            //  十、UI 更新
            // =========================================================================
            function updateUI() {
                const bpm = LRE.running ? LRE.bpm : (LRE.targetBpm || LRE.bpm);
                const rounded = Math.round(bpm);

                if (!LRE.running) {
                    bpmNumber.textContent = rounded;
                }

                if (LRE.resting) return;

                const diff = LRE.targetBpm - LRE.bpm;
                if (Math.abs(diff) < 0.5) {
                    preSign.className = 'pre-sign';
                    preSign.textContent = '—';
                } else if (diff > 0) {
                    preSign.className = 'pre-sign show up';
                    preSign.textContent = '↑';
                } else {
                    preSign.className = 'pre-sign show down';
                    preSign.textContent = '↓';
                }
                const warn = rounded > 160;
                bpmNumber.parentElement.classList.toggle('warn', warn);
                bpmRing.classList.toggle('warn', warn);
                bpmModeLabel.textContent = currentStrategy.getLabel() || '节奏';
                bpmModeLabel.classList.remove('resting-label');
                bpmBig.classList.remove('resting-color');
                restIcon.classList.remove('show');

                const isRunning = LRE.running;
                statusDot.className = 'dot' + (isRunning ? ' running' : '');
                statusLabel.textContent = isRunning ? '运行' : '待机';
                statusLabel.classList.remove('resting-label');
                btnStart.textContent = isRunning ? '■ 停止' : '▶ 开始';
                btnStart.classList.toggle('running', isRunning);
                app.classList.toggle('immersive', isRunning && !LRE.resting);

                if (!LRE.resting) {
                    btnEdge.classList.remove('resting-btn');
                    btnEdge.textContent = '🔴 边缘 ';
                    const countSpan = btnEdge.querySelector('.edge-count');
                    if (countSpan) countSpan.textContent = LRE.edgeCount;
                }

                edgeCount.textContent = LRE.edgeCount;
                dataEdge.textContent = LRE.edgeCount;
                const meta = MODE_META[LRE.mode] || { label: '固定', icon: '🔊' };
                currentModeDisplay.textContent = meta.label;
                currentModeDisplay.classList.remove('resting');

                if (isRunning) {
                    const mins = Math.floor(LRE.elapsed / 60);
                    const secs = Math.floor(LRE.elapsed % 60);
                    dataTime.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
                    dataMax.textContent = LRE.maxBpm > 0 ? Math.round(LRE.maxBpm) : '—';
                    dataAvg.textContent = LRE.bpmCount > 0 ? Math.round(LRE.bpmSum / LRE.bpmCount) : '—';
                }

                restProgressWrap.classList.remove('show');
                restProgressFill.style.width = '0%';
                bpmRing.classList.remove('resting-ring');
                beatProgressFill.classList.remove('resting-fill');
            }

            function updateProgress() {
                if (!LRE.running || LRE.totalDuration <= 0) {
                    progressFill.style.width = '0%';
                    return;
                }
                const progress = Math.min(LRE.elapsed / LRE.totalDuration, 1);
                const remain = Math.max(0, LRE.totalDuration - LRE.elapsed);
                const mins = Math.floor(remain / 60);
                const secs = Math.floor(remain % 60);
                timeRemain.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
                timeLabel.textContent =
                    `${String(Math.floor(LRE.elapsed/60)).padStart(2,'0')}:${String(Math.floor(LRE.elapsed%60)).padStart(2,'0')}`;
                progressFill.style.width = (progress * 100) + '%';
                progressFill.classList.remove('warning', 'danger', 'resting-progress');
                if (LRE.resting) progressFill.classList.add('resting-progress');
                if (progress > 0.7) progressFill.classList.add('danger');
                else if (progress > 0.4) progressFill.classList.add('warning');
                if (remain <= 0 && LRE.running) stopEngine();
            }

            // =========================================================================
            //  十一、引擎控制
            // =========================================================================

            function scheduleTick() {
                if (!LRE.running || LRE.resting) return;

                if (LRE.tickTimer) {
                    clearTimeout(LRE.tickTimer);
                    LRE.tickTimer = null;
                }

                const interval = 60000 / Math.max(LRE.bpm, 10);
                LRE._lastScheduledBpm = LRE.bpm;

                LRE.tickTimer = setTimeout(() => {
                    if (!LRE.running || LRE.resting) return;
                    const now = performance.now();
                    currentStrategy.update(LRE, now);
                    triggerBeat();
                    updateUI();
                    if (LRE.totalDuration > 0 && LRE.elapsed >= LRE.totalDuration) {
                        stopEngine();
                    }
                    scheduleTick();
                }, interval);
            }

            let _countdownTimer = null;
            let _countdownInterval = null;

            function startEngine() {
                if (LRE.running || LRE.countdownActive) {
                    if (LRE.countdownActive) {
                        cancelCountdown();
                        showToast('⏹ 已取消', '倒计时已终止');
                    }
                    return;
                }
                if (!LRE.bpm || LRE.bpm < 10) { LRE.bpm = 120;
                    LRE.targetBpm = 120; }
                gatherParams();
                LRE.totalDuration = currentStrategy.getDuration(LRE) || 600;
                if (LRE.totalDuration <= 0) LRE.totalDuration = 600;
                LRE.edgeCount = 0;
                LRE.elapsed = 0;
                LRE.maxBpm = LRE.bpm;
                LRE.bpmSum = 0;
                LRE.bpmCount = 0;
                LRE.energy = 0;
                LRE.energyTarget = 0;
                LRE.momentum = 0;
                LRE.canvasGlow = 0;
                LRE.canvasGlowTarget = 0;
                LRE.dom.beatWidth = 0;
                LRE.dom.bgFlash = 0;
                LRE.dom._heroBeatBoost = 0;
                LRE.dom._heroYBoost = 0;
                LRE.dom._heroShadowBoost = 0;
                LRE.dom._bpmScaleBoost = 0;
                LRE.dom._bpmGlowBoost = 0;
                LRE.dom._headBoost = 0;
                LRE.dom._bpmDisplay = LRE.bpm;
                LRE.dom._bpmDisplayTarget = LRE.bpm;
                LRE.resting = false;
                LRE.restPhase = null;
                LRE.restProgress = 0;
                LRE._lastScheduledBpm = LRE.bpm;
                LRE._jumpLock = false;
                LRE._lastJumpTime = 0;
                restProgressWrap.classList.remove('show');
                restProgressFill.style.width = '0%';
                btnEdge.classList.remove('resting-btn');
                btnEdge.textContent = '🔴 边缘 ';
                app.classList.remove('resting-active');

                for (const p of LRE.pulses) { p.active = false;
                    p.alpha = 0;
                    p.scale = 1;
                    p.blur = 0; }
                beatProgressFill.style.width = '0%';

                LRE.countdownActive = true;
                let count = 3;
                countdownOverlay.textContent = count;
                countdownOverlay.classList.add('show');
                playClick();

                _countdownInterval = setInterval(() => {
                    count--;
                    if (count > 0) {
                        countdownOverlay.textContent = count;
                        playClick();
                    } else {
                        clearInterval(_countdownInterval);
                        _countdownInterval = null;
                        countdownOverlay.classList.remove('show');
                        LRE.countdownActive = false;
                        LRE.running = true;
                        currentStrategy.init(LRE);
                        LRE.lastBeatTime = performance.now();
                        LRE._lastScheduledBpm = LRE.bpm;
                        LRE.dom._bpmDisplay = LRE.bpm;
                        LRE.dom._bpmDisplayTarget = LRE.bpm;
                        updateUI();
                        if (LRE.progressTimer) clearInterval(LRE.progressTimer);
                        LRE.progressTimer = setInterval(() => {
                            if (LRE.running) { LRE.elapsed += 0.1;
                                updateProgress(); }
                        }, 100);
                        if (LRE.dataTimer) clearInterval(LRE.dataTimer);
                        LRE.dataTimer = setInterval(() => {
                            if (LRE.running) updateUI();
                        }, 1000);
                        if (LRE.animRunning) {
                            cancelAnimationFrame(LRE.rafId);
                        }
                        LRE.animRunning = true;
                        LRE._lastUpdate = performance.now();
                        loop();
                        scheduleTick();
                    }
                }, 700);

                _countdownTimer = _countdownInterval;
            }

            function cancelCountdown() {
                if (_countdownInterval) {
                    clearInterval(_countdownInterval);
                    _countdownInterval = null;
                }
                if (_countdownTimer) {
                    clearInterval(_countdownTimer);
                    _countdownTimer = null;
                }
                LRE.countdownActive = false;
                countdownOverlay.classList.remove('show');
                btnStart.style.transform = 'scale(1)';
            }

            function stopEngine() {
                cancelCountdown();
                LRE.running = false;
                if (LRE.tickTimer) { clearTimeout(LRE.tickTimer);
                    LRE.tickTimer = null; }
                if (LRE.progressTimer) { clearInterval(LRE.progressTimer);
                    LRE.progressTimer = null; }
                if (LRE.dataTimer) { clearInterval(LRE.dataTimer);
                    LRE.dataTimer = null; }
                if (LRE.rafId) { cancelAnimationFrame(LRE.rafId);
                    LRE.rafId = null; }
                LRE.animRunning = false;
                LRE.resting = false;
                LRE.restPhase = null;
                restProgressWrap.classList.remove('show');
                restProgressFill.style.width = '0%';
                btnEdge.classList.remove('resting-btn');
                btnEdge.textContent = '🔴 边缘 ';
                app.classList.remove('resting-active');
                beatProgressFill.style.width = '0%';
                app.style.borderColor = 'var(--surface-border)';
                app.style.boxShadow = 'var(--shadow-lg)';
                updateUI();
                app.classList.remove('immersive');
                progressFill.style.width = '0%';
                progressFill.classList.remove('warning', 'danger', 'resting-progress');
                timeRemain.textContent = '—';
                timeLabel.textContent = '00:00';
                preSign.className = 'pre-sign';
                preSign.textContent = '—';
                btnStart.style.transform = 'scale(1)';
                LRE.dom.beatWidth = 0;
                LRE.dom.bgFlash = 0;
                LRE.dom._heroBeatBoost = 0;
                LRE.dom._heroYBoost = 0;
                LRE.dom._heroShadowBoost = 0;
                LRE.dom._bpmScaleBoost = 0;
                LRE.dom._bpmGlowBoost = 0;
                LRE.dom._headBoost = 0;
                LRE.energy = 0;
                LRE.energyTarget = 0;
                LRE.momentum = 0;
                LRE.core.radius = 0;
                LRE.core.alpha = 0;
                LRE.core.glow = 0;
                LRE.canvasGlow = 0;
                LRE.canvasGlowTarget = 0;
                for (const p of LRE.pulses) { p.active = false;
                    p.alpha = 0;
                    p.scale = 1;
                    p.blur = 0; }
                applyDOM();
                renderPulse();
                bpmBig.classList.remove('resting-color');
                bpmRing.classList.remove('resting-ring');
                beatProgressFill.classList.remove('resting-fill');
                restIcon.classList.remove('show');
                bpmModeLabel.classList.remove('resting-label');
                statusDot.className = 'dot';
                statusLabel.classList.remove('resting-label');
                currentModeDisplay.classList.remove('resting');
                const countSpan = btnEdge.querySelector('.edge-count');
                if (countSpan) countSpan.textContent = LRE.edgeCount;
            }

            function resetEngine() {
                cancelCountdown();
                if (LRE.resting) {
                    LRE.resting = false;
                    LRE.restPhase = null;
                    restProgressWrap.classList.remove('show');
                    restProgressFill.style.width = '0%';
                    btnEdge.classList.remove('resting-btn');
                    btnEdge.textContent = '🔴 边缘 ';
                    app.classList.remove('resting-active');
                    bpmBig.classList.remove('resting-color');
                    bpmRing.classList.remove('resting-ring');
                    beatProgressFill.classList.remove('resting-fill');
                    restIcon.classList.remove('show');
                    bpmModeLabel.classList.remove('resting-label');
                    statusDot.className = 'dot';
                    statusLabel.classList.remove('resting-label');
                    currentModeDisplay.classList.remove('resting');
                }
                stopEngine();
                LRE.bpm = LRE.targetBpm || 120;
                LRE.edgeCount = 0;
                LRE.elapsed = 0;
                LRE.maxBpm = 0;
                LRE.bpmSum = 0;
                LRE.bpmCount = 0;
                LRE.strategyState = {};
                LRE.canvasGlow = 0;
                LRE.canvasGlowTarget = 0;
                LRE.restOriginalBpm = 120;
                LRE.restCurrentBpm = 120;
                LRE.restProgress = 0;
                LRE._jumpLock = false;
                LRE._lastJumpTime = 0;
                LRE.dom._bpmDisplay = LRE.bpm;
                LRE.dom._bpmDisplayTarget = LRE.bpm;
                for (const p of LRE.pulses) { p.active = false;
                    p.alpha = 0;
                    p.scale = 1;
                    p.blur = 0; }
                LRE.core.radius = 0;
                LRE.core.alpha = 0;
                LRE.core.glow = 0;
                timeLabel.textContent = '00:00';
                timeRemain.textContent = '—';
                progressFill.style.width = '0%';
                progressFill.classList.remove('warning', 'danger', 'resting-progress');
                beatProgressFill.style.width = '0%';
                app.style.borderColor = 'var(--surface-border)';
                app.style.boxShadow = 'var(--shadow-lg)';
                renderPulse();
                updateUI();
                gatherParams();
                dataEdge.textContent = '0';
                dataTime.textContent = '00:00';
                dataMax.textContent = '—';
                dataAvg.textContent = '—';
                preSign.className = 'pre-sign';
                preSign.textContent = '—';
                statusDot.className = 'dot';
                statusLabel.textContent = '待机';
                LRE.dom.beatWidth = 0;
                LRE.dom.bgFlash = 0;
                LRE.dom._heroBeatBoost = 0;
                LRE.dom._heroYBoost = 0;
                LRE.dom._heroShadowBoost = 0;
                LRE.dom._bpmScaleBoost = 0;
                LRE.dom._bpmGlowBoost = 0;
                LRE.dom._headBoost = 0;
                LRE.energy = 0;
                LRE.energyTarget = 0;
                LRE.momentum = 0;
                applyDOM();
                btnStart.style.transform = 'scale(1)';
                bpmBig.style.transform = 'scale(1)';
                bpmBig.style.textShadow = 'none';
                bpmHero.style.transform = 'scale(1)';
                bpmHero.style.boxShadow = 'var(--shadow)';
                app.style.background = 'var(--surface)';
                beatProgressFill.style.boxShadow = '0 0 18px rgba(124,58,237,0.15)';
                bpmBig.classList.remove('resting-color');
                bpmRing.classList.remove('resting-ring');
                beatProgressFill.classList.remove('resting-fill');
                restIcon.classList.remove('show');
                bpmModeLabel.classList.remove('resting-label');
                statusDot.className = 'dot';
                statusLabel.classList.remove('resting-label');
                currentModeDisplay.classList.remove('resting');
                restProgressWrap.classList.remove('show');
                restProgressFill.style.width = '0%';
                btnEdge.classList.remove('resting-btn');
                btnEdge.textContent = '🔴 边缘 ';
                const countSpan = btnEdge.querySelector('.edge-count');
                if (countSpan) countSpan.textContent = '0';
                edgeCount.textContent = '0';
                app.classList.remove('resting-active');
                LRE.resting = false;
                LRE.restPhase = null;
                bpmNumber.textContent = Math.round(LRE.bpm);
            }

            function loop() {
                if (!LRE.animRunning) return;
                if (document.hidden) {
                    LRE.rafId = requestAnimationFrame(loop);
                    return;
                }
                const now = performance.now();
                updateLRE(now);
                LRE.rafId = requestAnimationFrame(loop);
            }

            // =========================================================================
            //  十二、模式切换 & 参数
            // =========================================================================
            function switchMode(mode) {
                cancelCountdown();
                if (LRE.running) stopEngine();
                if (LRE.resting) {
                    LRE.resting = false;
                    LRE.restPhase = null;
                    restProgressWrap.classList.remove('show');
                    restProgressFill.style.width = '0%';
                    btnEdge.classList.remove('resting-btn');
                    btnEdge.textContent = '🔴 边缘 ';
                    app.classList.remove('resting-active');
                    bpmBig.classList.remove('resting-color');
                    bpmRing.classList.remove('resting-ring');
                    beatProgressFill.classList.remove('resting-fill');
                    restIcon.classList.remove('show');
                    bpmModeLabel.classList.remove('resting-label');
                    statusDot.className = 'dot';
                    statusLabel.classList.remove('resting-label');
                    currentModeDisplay.classList.remove('resting');
                }
                LRE.mode = mode;
                LRE.params = {};
                LRE.strategyState = {};
                LRE._jumpLock = false;
                LRE._lastJumpTime = 0;
                const factory = modeFactory[mode];
                currentStrategy = factory ? factory() : new FixedMode();
                const defs = getParamDefs(mode);
                defs.forEach(d => {
                    if (d.id === 'bpm') LRE.bpm = d.default;
                    if (d.id === 'startBpm') LRE.bpm = d.default;
                    if (d.id === 'safeBpm') LRE.bpm = d.default;
                    if (d.id === 'minBpm') {
                        const maxD = defs.find(x => x.id === 'maxBpm');
                        LRE.bpm = Math.round((d.default + (maxD ? maxD.default : 200)) / 2);
                    }
                    if (d.id === 'duration') LRE.totalDuration = d.default * 60;
                    if (!(d.id in LRE.params)) {
                        if (d.type === 'bpmList') {
                            LRE.params[d.id] = [...(d.default || [])];
                        } else {
                            LRE.params[d.id] = d.default;
                        }
                    }
                });
                LRE.targetBpm = LRE.bpm;
                LRE.dom._bpmDisplay = LRE.bpm;
                LRE.dom._bpmDisplayTarget = LRE.bpm;
                currentStrategy.init(LRE);
                const meta = MODE_META[mode] || { label: '固定', icon: '⩩' };
                currentModeDisplay.textContent = meta.label;
                updateUI();
                renderPulse();
                beatProgressFill.style.width = '0%';
                timeLabel.textContent = '00:00';
                timeRemain.textContent = '—';
                progressFill.style.width = '0%';
                progressFill.classList.remove('warning', 'danger', 'resting-progress');
                dataEdge.textContent = '0';
                dataTime.textContent = '00:00';
                dataMax.textContent = '—';
                dataAvg.textContent = '—';
                preSign.className = 'pre-sign';
                preSign.textContent = '—';
                statusDot.className = 'dot';
                statusLabel.textContent = '待机';
                LRE.dom.beatWidth = 0;
                LRE.dom.bgFlash = 0;
                LRE.dom._heroBeatBoost = 0;
                LRE.dom._heroYBoost = 0;
                LRE.dom._heroShadowBoost = 0;
                LRE.dom._bpmScaleBoost = 0;
                LRE.dom._bpmGlowBoost = 0;
                LRE.dom._headBoost = 0;
                LRE.energy = 0;
                LRE.energyTarget = 0;
                LRE.momentum = 0;
                LRE.core.radius = 0;
                LRE.core.alpha = 0;
                LRE.core.glow = 0;
                LRE.canvasGlow = 0;
                LRE.canvasGlowTarget = 0;
                LRE.restOriginalBpm = 120;
                LRE.restCurrentBpm = 120;
                LRE.restProgress = 0;
                LRE.resting = false;
                LRE.restPhase = null;
                LRE._lastScheduledBpm = LRE.bpm;
                restProgressWrap.classList.remove('show');
                restProgressFill.style.width = '0%';
                btnEdge.classList.remove('resting-btn');
                btnEdge.textContent = '🔴 边缘 ';
                app.classList.remove('resting-active');
                bpmBig.classList.remove('resting-color');
                bpmRing.classList.remove('resting-ring');
                beatProgressFill.classList.remove('resting-fill');
                restIcon.classList.remove('show');
                bpmModeLabel.classList.remove('resting-label');
                statusDot.className = 'dot';
                statusLabel.classList.remove('resting-label');
                currentModeDisplay.classList.remove('resting');
                bpmNumber.textContent = Math.round(LRE.bpm);
                applyDOM();
                btnStart.style.transform = 'scale(1)';
                bpmBig.style.transform = 'scale(1)';
                bpmBig.style.textShadow = 'none';
                bpmHero.style.transform = 'scale(1)';
                bpmHero.style.boxShadow = 'var(--shadow)';
                app.style.background = 'var(--surface)';
                beatProgressFill.style.boxShadow = '0 0 18px rgba(124,58,237,0.15)';
                document.querySelectorAll('.mode-list-item').forEach(el => {
                    el.classList.toggle('active', el.dataset.mode === mode);
                });
                closeModalMode();
                showToast(`${meta.icon} 切换至 ${meta.label}模式`, '节奏模式已更新');
            }

            // =========================================================================
            //  十三、模态窗口控制
            // =========================================================================
            function openModalMode() { modalMode.classList.add('open'); }

            function closeModalMode() { modalMode.classList.remove('open'); }

            function openModalParams() {
                renderParamsModal(LRE.mode);
                const meta = MODE_META[LRE.mode] || { label: '固定', icon: '🔊' };
                paramsModalTitle.textContent = `⚙ 高级参数 · ${meta.label}`;
                modalParams.classList.add('open');
            }

            function closeModalParams() { modalParams.classList.remove('open'); }

            // =========================================================================
            //  十四、Toast
            // =========================================================================
            let toastTimer = null;

            function showToast(text, sub) {
                toastText.textContent = text;
                toastSub.textContent = sub || '';
                toastFloat.classList.add('show');
                if (toastTimer) clearTimeout(toastTimer);
                toastTimer = setTimeout(() => {
                    toastFloat.classList.remove('show');
                    toastTimer = null;
                }, 3000);
            }

            // =========================================================================
            //  十五、参数渲染
            // =========================================================================
            function renderBpmTagsModal(container, list) {
                container.innerHTML = '';
                list.forEach((bpm, idx) => {
                    const tag = document.createElement('span');
                    tag.className = 'bpm-tag';
                    tag.innerHTML =
                        `${bpm} <span class="del" data-idx="${idx}">✕</span>`;
                    tag.querySelector('.del').addEventListener('click', function() {
                        const i = parseInt(this.dataset.idx);
                        const current = LRE.params.bpmList || [];
                        current.splice(i, 1);
                        LRE.params.bpmList = current;
                        renderBpmTagsModal(container, current);
                        LRE.strategyState = {};
                        if (LRE.running) {
                            gatherParams();
                            currentStrategy.init(LRE);
                            updateUI();
                            renderPulse();
                        }
                    });
                    container.appendChild(tag);
                });
                if (list.length === 0) {
                    const empty = document.createElement('span');
                    empty.style.color = 'var(--text-muted)';
                    empty.style.fontSize = 'var(--text-xs)';
                    empty.textContent = '添加 BPM';
                    container.appendChild(empty);
                }
            }

            function renderParamsModal(mode) {
                const defs = getParamDefs(mode);
                paramsGridModal.innerHTML = '';
                defs.forEach(def => {
                    if (!(def.id in LRE.params)) {
                        if (def.type === 'bpmList') {
                            LRE.params[def.id] = [...(def.default || [])];
                        } else {
                            LRE.params[def.id] = def.default;
                        }
                    }
                });

                defs.forEach(def => {
                    const div = document.createElement('div');
                    div.className = 'param-group';
                    const label = document.createElement('label');
                    label.textContent = def.label;
                    div.appendChild(label);

                    if (def.type === 'range') {
                        const valSpan = document.createElement('span');
                        valSpan.className = 'param-value';
                        valSpan.textContent = LRE.params[def.id] ?? def.default;
                        label.appendChild(valSpan);
                        const input = document.createElement('input');
                        input.type = 'range';
                        input.min = def.min;
                        input.max = def.max;
                        input.step = def.step || 1;
                        input.value = LRE.params[def.id] ?? def.default;
                        input.dataset.paramId = def.id;
                        input.addEventListener('input', function() {
                            const v = parseFloat(this.value);
                            valSpan.textContent = v;
                            LRE.params[def.id] = v;
                            if (LRE.running) {
                                gatherParams();
                                currentStrategy.init(LRE);
                                updateUI();
                                renderPulse();
                            }
                        });
                        div.appendChild(input);
                        const labels = document.createElement('div');
                        labels.className = 'range-labels';
                        labels.innerHTML = `<span>${def.min}</span><span>${def.max}</span>`;
                        div.appendChild(labels);

                    } else if (def.type === 'number') {
                        const input = document.createElement('input');
                        input.type = 'number';
                        input.min = def.min;
                        input.max = def.max;
                        input.step = def.step || 1;
                        input.value = LRE.params[def.id] ?? def.default;
                        input.dataset.paramId = def.id;
                        input.addEventListener('change', function() {
                            let v = parseFloat(this.value) || def.default;
                            if (def.min !== undefined) v = Math.max(v, def.min);
                            if (def.max !== undefined) v = Math.min(v, def.max);
                            this.value = v;
                            LRE.params[def.id] = v;
                            if (LRE.running) {
                                gatherParams();
                                currentStrategy.init(LRE);
                                updateUI();
                                renderPulse();
                            }
                        });
                        div.appendChild(input);

                    } else if (def.type === 'radio') {
                        const group = document.createElement('div');
                        group.className = 'radio-group';
                        const current = LRE.params[def.id] ?? def.default;
                        def.options.forEach(opt => {
                            const btn = document.createElement('span');
                            btn.className = 'radio-opt' + (opt === current ? ' active' : '');
                            btn.textContent = opt;
                            btn.dataset.value = opt;
                            btn.addEventListener('click', function() {
                                group.querySelectorAll('.radio-opt').forEach(b => b.classList.remove(
                                    'active'));
                                this.classList.add('active');
                                LRE.params[def.id] = this.dataset.value;
                                if (LRE.running) {
                                    gatherParams();
                                    currentStrategy.init(LRE);
                                    updateUI();
                                    renderPulse();
                                }
                            });
                            group.appendChild(btn);
                        });
                        div.appendChild(group);

                    } else if (def.type === 'bpmList') {
                        const container = document.createElement('div');
                        container.className = 'bpm-list';
                        const addRow = document.createElement('div');
                        addRow.className = 'add-bpm-row';
                        const addInput = document.createElement('input');
                        addInput.type = 'number';
                        addInput.min = 30;
                        addInput.max = 250;
                        addInput.placeholder = 'BPM';
                        addInput.value = 120;
                        const addBtn = document.createElement('button');
                        addBtn.className = 'btn-sm';
                        addBtn.textContent = '+';
                        addBtn.addEventListener('click', function() {
                            const val = parseInt(addInput.value);
                            if (isNaN(val) || val < 30 || val > 250) return;
                            const list = LRE.params[def.id] || [];
                            list.push(val);
                            LRE.params[def.id] = list;
                            renderBpmTagsModal(container, list);
                            addInput.value = '';
                            LRE.strategyState = {};
                            if (LRE.running) {
                                gatherParams();
                                currentStrategy.init(LRE);
                                updateUI();
                                renderPulse();
                            }
                        });
                        addRow.appendChild(addInput);
                        addRow.appendChild(addBtn);
                        div.appendChild(container);
                        div.appendChild(addRow);
                        const list = LRE.params[def.id] || [...(def.default || [])];
                        renderBpmTagsModal(container, list);
                        addInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') addBtn.click(); });

                    } else if (def.type === 'waveform') {
                        const group = document.createElement('div');
                        group.className = 'waveform-btns';
                        const current = LRE.params[def.id] ?? def.default;
                        def.options.forEach(opt => {
                            const btn = document.createElement('button');
                            btn.className = 'wf-btn' + (opt === current ? ' active' : '');
                            btn.textContent = opt;
                            btn.dataset.value = opt;
                            btn.addEventListener('click', function() {
                                group.querySelectorAll('.wf-btn').forEach(b => b.classList.remove(
                                    'active'));
                                this.classList.add('active');
                                LRE.params[def.id] = this.dataset.value;
                                if (LRE.running) {
                                    gatherParams();
                                    currentStrategy.init(LRE);
                                    updateUI();
                                    renderPulse();
                                }
                            });
                            group.appendChild(btn);
                        });
                        div.appendChild(group);
                    }
                    paramsGridModal.appendChild(div);
                });
            }

            function gatherParams() {
                const mode = LRE.mode;
                const defs = getParamDefs(mode);
                defs.forEach(def => {
                    if (def.id === 'duration' && LRE.params.duration) {
                        LRE.totalDuration = LRE.params.duration * 60;
                    }
                });
                if (mode === MODES.FIXED) {
                    LRE.bpm = LRE.params.bpm || 120;
                    LRE.targetBpm = LRE.bpm;
                } else if (mode === MODES.VARIATION) {
                    const list = LRE.params.bpmList || [];
                    if (list.length > 0) { LRE.bpm = list[0];
                        LRE.targetBpm = list[0];
                        LRE.strategyState = {}; }
                } else if (mode === MODES.COOLDOWN) {
                    LRE.bpm = LRE.params.startBpm || 180;
                    LRE.targetBpm = LRE.bpm;
                    LRE.strategyState = {};
                } else if (mode === MODES.HEATUP) {
                    LRE.bpm = LRE.params.startBpm || 60;
                    LRE.targetBpm = LRE.bpm;
                    LRE.strategyState = {};
                } else if (mode === MODES.RANDOM) {
                    const minB = LRE.params.minBpm || 60,
                        maxB = LRE.params.maxBpm || 200;
                    LRE.bpm = Math.round((minB + maxB) / 2);
                    LRE.targetBpm = LRE.bpm;
                    LRE.strategyState = {};
                } else if (mode === MODES.WAVE) {
                    const minB = LRE.params.minBpm || 60,
                        maxB = LRE.params.maxBpm || 200;
                    LRE.bpm = Math.round((minB + maxB) / 2);
                    LRE.targetBpm = LRE.bpm;
                    LRE.strategyState = { startTime: performance.now() };
                } else if (mode === MODES.CHASE) {
                    LRE.bpm = LRE.params.safeBpm || 90;
                    LRE.targetBpm = LRE.bpm;
                    LRE.strategyState = {};
                }
                currentStrategy.init(LRE);
                LRE.dom._bpmDisplay = LRE.bpm;
                LRE.dom._bpmDisplayTarget = LRE.bpm;
                updateUI();
                renderPulse();
            }

            // =========================================================================
            //  十六、生成模式列表
            // =========================================================================
            function renderModeList() {
                modeList.innerHTML = '';
                const modes = [
                    { id: 'fixed', label: '固定', icon: '🎯' },
                    { id: 'variation', label: '变奏', icon: '🌊' },
                    { id: 'cooldown', label: '渐冻', icon: '❄️' },
                    { id: 'heatup', label: '渐热', icon: '🔥' },
                    { id: 'random', label: '随机', icon: '🎲' },
                    { id: 'wave', label: '波浪', icon: '〰️' },
                    { id: 'chase', label: '追逃', icon: '🏹' }
                ];
                modes.forEach(m => {
                    const item = document.createElement('div');
                    item.className = 'mode-list-item' + (m.id === LRE.mode ? ' active' : '');
                    item.dataset.mode = m.id;
                    item.innerHTML = `
                        <span><span class="mode-icon">${m.icon}</span><span class="mode-label">${m.label}</span></span>
                        <span class="mode-check">✓</span>
                    `;
                    item.addEventListener('click', function() {
                        const modeId = this.dataset.mode;
                        if (modeId !== LRE.mode) {
                            switchMode(modeId);
                        } else {
                            closeModalMode();
                        }
                    });
                    modeList.appendChild(item);
                });
            }

            // =========================================================================
            //  十七、事件绑定
            // =========================================================================
            btnModeSwitch.addEventListener('click', openModalMode);
            modalModeClose.addEventListener('click', closeModalMode);
            modalMode.addEventListener('click', function(e) {
                if (e.target === this) closeModalMode();
            });

            btnParams.addEventListener('click', openModalParams);
            modalParamsClose.addEventListener('click', closeModalParams);
            modalParams.addEventListener('click', function(e) {
                if (e.target === this) closeModalParams();
            });
            paramsCancel.addEventListener('click', closeModalParams);
            paramsConfirm.addEventListener('click', function() {
                gatherParams();
                const meta = MODE_META[LRE.mode] || { label: '固定', icon: '(づ￣ 3￣)づ' };
                currentModeDisplay.textContent = meta.label;
                updateUI();
                renderPulse();
                closeModalParams();
                showToast(`✅ 参数已生效`, `${meta.label}模式设置已更新`);
            });

            btnEdge.addEventListener('click', function() {
                if (!LRE.running) {
                    showToast('⏸ 请先开始节奏', '点击「开始」再使用边缘休息');
                    return;
                }
                if (LRE.resting) {
                    showToast('🧘 已在休息中', `剩余 ${Math.round((1 - LRE.restProgress) * 25)} 秒`);
                    return;
                }
                enterRestState();
            });

            btnStart.addEventListener('click', function() {
                if (LRE.running) {
                    if (LRE.resting) {
                        LRE.resting = false;
                        LRE.restPhase = null;
                        restProgressWrap.classList.remove('show');
                        restProgressFill.style.width = '0%';
                        btnEdge.classList.remove('resting-btn');
                        btnEdge.textContent = '🔴 边缘 ';
                        app.classList.remove('resting-active');
                        bpmBig.classList.remove('resting-color');
                        bpmRing.classList.remove('resting-ring');
                        beatProgressFill.classList.remove('resting-fill');
                        restIcon.classList.remove('show');
                        bpmModeLabel.classList.remove('resting-label');
                        statusDot.className = 'dot';
                        statusLabel.classList.remove('resting-label');
                        currentModeDisplay.classList.remove('resting');
                    }
                    stopEngine();
                } else {
                    startEngine();
                }
            });

            btnReset.addEventListener('click', function() {
                resetEngine();
            });

            // 保留键盘事件，但不在UI显示（移动端为主）
            document.addEventListener('keydown', function(e) {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    btnStart.click();
                }
                if (e.key === 'e' || e.key === 'E') {
                    if (LRE.running) btnEdge.click();
                }
                if (e.key === 'Escape') {
                    if (modalMode.classList.contains('open')) closeModalMode();
                    if (modalParams.classList.contains('open')) closeModalParams();
                }
            });

            document.addEventListener('click', function(e) {
                if (modalMode.classList.contains('open') && !modalMode.querySelector('.modal-card').contains(e
                    .target) && !btnModeSwitch.contains(e.target)) {
                    closeModalMode();
                }
            });

            // =========================================================================
            //  十八、初始化
            // =========================================================================
            function init() {
                renderModeList();
                switchMode(MODES.FIXED);
                resizePulse();
                const ro = new ResizeObserver(() => resizePulse());
                ro.observe(pulseCanvas);
                renderPulse();
                updateUI();
                LRE.totalDuration = 600;
                updateProgress();
                LRE.animRunning = true;
                LRE._lastUpdate = performance.now();
                LRE.dom.ambientPhase = Math.random() * 100;
                LRE.dom._bpmDisplay = LRE.bpm;
                LRE.dom._bpmDisplayTarget = LRE.bpm;
                loop();
                btnStart.style.transform = 'scale(1)';
                bpmHero.style.transform = 'scale(1)';
                bpmHero.style.boxShadow = 'var(--shadow)';
                const countSpan = btnEdge.querySelector('.edge-count');
                if (countSpan) countSpan.textContent = '0';
                edgeCount.textContent = '0';
                bpmNumber.textContent = Math.round(LRE.bpm);
                setTimeout(() => {
                    showToast('🎵 节奏边缘 · 选择模式后可调整具体游戏参数');
                }, 600);
            }

            init();

            // 不暴露全局变量

        })();
    </script>
</body>
</html>
